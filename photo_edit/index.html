<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <base href="./">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دمج 8 صور مع حفظ الشفافية</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px 0;
        }
        .container {
            background: #fff;
            padding: 2rem;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.12);
            width: 95%;
            max-width: 650px;
            text-align: center;
        }
        h2 { margin: 0 0 5px; color: #2d3748; }
        p { color: #718096; margin: 0 0 20px; font-size: 14px; }
        
        .slots-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }
        .slot {
            position: relative;
            border: 2px dashed #cbd5e0;
            border-radius: 12px;
            padding: 12px;
            background: #f8fafc;
            transition: all 0.2s ease;
            height: 150px;
        }
        .slot:hover { border-color: #4299e1; background: #ebf8ff; }
        .slot.filled { border-color: #48bb78; background: #f0fff4; }
        
        .slot label {
            display: block;            margin-bottom: 8px;
            font-weight: 600;
            color: #4a5568;
            font-size: 14px;
        }
        .file-input {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0;
            cursor: pointer;
        }
        .preview {
            width: 100%;
            height: 90px;
            background: #e2e8f0;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            color: #a0aec0;
            font-size: 13px;
            pointer-events: none;
        }
        .preview img { width: 100%; height: 100%; object-fit: cover; }

        button {
            background: #3182ce;
            color: white;
            border: none;
            padding: 14px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-weight: 600;
            transition: background 0.2s;
        }
        button:hover:not(:disabled) { background: #2b6cb0; }
        button:disabled { background: #a0aec0; cursor: not-allowed; }
        
        #status {
            margin-top: 15px;
            font-size: 14px;
            min-height: 20px;
            font-weight: 500;
        }
        .success { color: #38a169; }
        .error { color: #e53e3e; }
        .info { color: #3182ce; }        
        /* تنسيق منطقة النتيجة */
        #resultArea {
            display: none;
            margin-top: 25px;
            border-top: 2px solid #edf2f7;
            padding-top: 20px;
            animation: fadeIn 0.5s ease;
        }
        
        /* الخلفية الشطرنجية لإثبات الشفافية */
        .transparent-checkerboard {
            background-color: #ffffff;
            background-image: 
                linear-gradient(45deg, #e2e8f0 25%, transparent 25%), 
                linear-gradient(-45deg, #e2e8f0 25%, transparent 25%), 
                linear-gradient(45deg, transparent 75%, #e2e8f0 75%), 
                linear-gradient(-45deg, transparent 75%, #e2e8f0 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #cbd5e0;
        }

        #finalImage {
            width: 100%;
            height: auto;
            display: block;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        .download-btn {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 20px;
            background: #38a169;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
        }
        .download-hint {
            margin-top: 10px;
            font-size: 13px;
            color: #718096;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 480px) {
            .slots-grid { grid-template-columns: 1fr; }
            .container { padding: 1.5rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🖼️ دمج 8 صور (يدعم الشفافية)</h2>
    <p>ارفع صور PNG شفافة لدمجها في شريط واحد بخلفية شفافة</p>
    
    <div class="slots-grid" id="slotsGrid"></div>

    <button id="convertBtn" disabled>تحويل ودمج الصور</button>
    <div id="status"></div>

    <div id="resultArea">
        <h3 style="margin:0 0 10px; color:#2d3748;">✅ النتيجة (خلفية شفافة):</h3>
        <!-- الصندوق ذو الخلفية الشطرنجية يوضح أن الصورة شفافة -->
        <div class="transparent-checkerboard">
            <img id="finalImage" alt="الصورة المدمجة الشفافة">
        </div>
        <div class="download-hint">المربعات الرمادية خلف الصورة تعني أنها شفافة فعلاً.</div>
        <a id="downloadLink" class="download-btn" download="merged_transparent.png">️ حفظ الصورة (PNG شفاف)</a>
    </div>
</div>

<script>
    const grid = document.getElementById('slotsGrid');
    const convertBtn = document.getElementById('convertBtn');
    const status = document.getElementById('status');
    const resultArea = document.getElementById('resultArea');
    const finalImage = document.getElementById('finalImage');
    const downloadLink = document.getElementById('downloadLink');

    // إنشاء الخانات
    for (let i = 0; i < 8; i++) {
        const slot = document.createElement('div');
        slot.className = 'slot';
        slot.dataset.index = i;
        slot.innerHTML = `
            <label>صورة ${i + 1}</label>
            <input type="file" accept="image/*" class="file-input">
            <div class="preview">اختر صورة</div>
        `;
        grid.appendChild(slot);    }

    const slots = document.querySelectorAll('.slot');

    function checkAllFilled() {
        const filledCount = Array.from(slots).filter(s => s.querySelector('.file-input').files.length > 0).length;
        const allFilled = filledCount === 8;
        
        convertBtn.disabled = !allFilled;
        status.textContent = allFilled 
            ? '✅ جاهز للدمج.' 
            : `تم ملء ${filledCount} من 8 خانات`;
        status.className = allFilled ? 'success' : 'info';
    }

    slots.forEach((slot) => {
        const input = slot.querySelector('.file-input');
        const preview = slot.querySelector('.preview');

        input.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    preview.innerHTML = `<img src="${ev.target.result}" alt="معاينة">`;
                    slot.classList.add('filled');
                };
                reader.readAsDataURL(file);
            } else {
                preview.innerHTML = 'اختر صورة';
                slot.classList.remove('filled');
            }
            checkAllFilled();
        });
    });

    convertBtn.addEventListener('click', async () => {
        convertBtn.disabled = true;
        status.textContent = '⏳ جاري المعالجة...';
        status.className = 'info';
        resultArea.style.display = 'none';

        try {
            const images = [];
            const fileInputs = Array.from(slots).map(s => s.querySelector('.file-input'));

            for (const input of fileInputs) {
                const file = input.files[0];
                const img = new Image();
                img.src = URL.createObjectURL(file);                
                await new Promise((resolve, reject) => {
                    img.onload = resolve;
                    img.onerror = () => reject(new Error('فشل تحميل صورة'));
                });
                images.push(img);
            }

            const canvas = document.createElement('canvas');
            canvas.width = 4000;
            canvas.height = 500;
            const ctx = canvas.getContext('2d');

            // ملاحظة: لم نقم بملء الخلفية بلون، لذا هي شفافة افتراضياً
            
            images.forEach((img, index) => {
                // رسم الصورة مع الحفاظ على الشفافية
                ctx.drawImage(img, index * 500, 0, 500, 500);
                URL.revokeObjectURL(img.src);
            });

            const dataUrl = canvas.toDataURL('image/png'); // PNG يدعم الشفافية
            
            finalImage.src = dataUrl;
            downloadLink.href = dataUrl;
            resultArea.style.display = 'block';
            
            status.textContent = '✅ تم الدمج مع حفظ الشفافية!';
            status.className = 'success';
            resultArea.scrollIntoView({ behavior: 'smooth' });

        } catch (err) {
            status.textContent = '❌ خطأ: ' + err.message;
            status.className = 'error';
        } finally {
            convertBtn.disabled = false;
        }
    });
</script>

</body>
</html>
