<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Cheetah Power - عارض الشخصية</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: rgba(0,0,0,0.6);
            border-radius: 30px;
            padding: 25px;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.2);
            max-width: 1000px;
            width: 100%;
        }
        h1 { text-align: center; color: #f39c12; margin-bottom: 10px; font-size: 26px; }
        .subtitle { text-align: center; color: #aaa; margin-bottom: 20px; font-size: 13px; }
        .canvas-wrapper { display: flex; justify-content: center; margin-bottom: 20px; }
        canvas {
            background: #0a0a2a;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            image-rendering: crisp-edges;
            image-rendering: pixelated;
        }
        .toggle-auto-btn {
            background: #f39c12;
            border: none;
            color: #1a1a2e;
            font-size: 18px;
            font-weight: bold;
            padding: 12px 30px;
            margin: 10px auto;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 4px 0 #b86f0c;
            display: block;
            width: 80%;
            max-width: 250px;
        }
        .toggle-auto-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #b86f0c; }
        .toggle-auto-btn.running { background: #e74c3c; color: white; box-shadow: 0 4px 0 #8b1a1a; }
        .info { text-align: center; color: #ccc; font-size: 12px; margin-top: 15px; padding: 10px; background: rgba(0,0,0,0.4); border-radius: 15px; }
        .status { text-align: center; font-size: 12px; color: #27ae60; margin-top: 10px; }
        .btn-group { display: flex; justify-content: center; gap: 15px; margin-top: 10px; flex-wrap: wrap; }
        .action-btn { background: #e74c3c; border: none; color: white; padding: 8px 20px; border-radius: 30px; cursor: pointer; font-weight: bold; }
        .action-btn:active { transform: scale(0.95); }
        .reset-btn { background: #3498db; }
        .select-btn { background: #2ecc71; }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .modal-overlay.active { display: flex; }
.modal {
    background: #1a1a2e;
    border-radius: 20px;
    padding: 25px;
    max-width: 900px;
    width: 100%;
    max-height: 80vh;
    border: 1px solid rgba(255,255,255,0.2);
    display: flex;
    flex-direction: column;
}

        .modal h2 { color: #f39c12; text-align: center; margin-bottom: 20px; }
        .modal-close {
            background: #e74c3c;
            border: none;
            color: white;
            padding: 8px 25px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            float: left;
        }
        .modal-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .modal-tab {
            background: #2c3e50;
            border: none;
            color: white;
            padding: 8px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
        }
        .modal-tab.active { background: #f39c12; color: #1a1a2e; }
        .modal-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }
.modal-item {
    background: rgba(255,255,255,0.05);
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    border-radius: 10px;
    padding: 15px;
    text-align: center;
    cursor: pointer;
    transition: 0.2s;
    border: 2px solid transparent;
    min-height: 180px;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    align-items: center;
}

.modal-item:hover { 
    background: rgba(255,255,255,0.1);
    background-size: cover;
    background-position: center;
}

.modal-item.selected { 
    border-color: #f39c12; 
    background: rgba(243,156,18,0.2);
    background-size: cover;
    background-position: center;
}

.modal-item img {
    display: none;  /* إخفاء عنصر img */
}

.modal-item .name {
    color: #fff;
    font-size: 14px;
    margin-top: 5px;
    display: block;
    background: rgba(0,0,0,0.7);
    padding: 4px 12px;
    border-radius: 12px;
    text-shadow: 0 1px 3px rgba(0,0,0,0.8);
}
        .modal-item .name {
            color: #ccc;
            font-size: 11px;
            margin-top: 5px;
            display: block;
        }
        .modal-loading {
            text-align: center;
            color: #aaa;
            padding: 40px;
        }
        .modal-actions {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
        }
        .modal-apply {
            background: #f39c12;
            border: none;
            color: #1a1a2e;
            padding: 10px 40px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
        }
        .modal-error {
            color: #e74c3c;
            text-align: center;
            padding: 20px;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🐆 Cheetah Power - عارض الشخصية</h1>
    <div class="subtitle">السماء ثابتة | الأرض تتحرك يساراً | اللاعب ثابت في المنتصف</div>
    
    <div class="canvas-wrapper">
        <canvas id="gameCanvas" width="1280" height="720"></canvas>
    </div>
    
    <button class="toggle-auto-btn running" id="toggleAutoBtn"> stop</button>
    
    <div class="btn-group">
        <button class="action-btn" id="attackBtn">attack</button>
        <button class="action-btn select-btn" id="selectBtn">🎮 اختيار الشخصية</button>
    </div>
    
    <div class="info" id="info"></div>
    <div class="status" id="status"></div>
</div>

<div class="modal-overlay" id="modalOverlay">
    <div class="modal">
        <button class="modal-close" id="modalClose">✕ إغلاق</button>
        <h2>🎮 اختيار الشخصية</h2>
        
        <div class="modal-tabs">
            <button class="modal-tab active" data-tab="0">👤 اللاعبين</button>
            <button class="modal-tab" data-tab="1">🏟️ الساحات</button>
            <button class="modal-tab" data-tab="2">👾 الأعداء</button>
        </div>
        
<div id="modalContent" style="flex:1; overflow-y:auto; margin:10px 0;">
    <div class="modal-loading">⏳ جاري التحميل...</div>
</div>
        
        <div class="modal-actions">
            <button class="modal-apply" id="modalApply">✅ تطبيق</button>
        </div>
    </div>
</div>

<script>
    class GameViewer {
        constructor() {
        
        this.enemyImg = null;
this.enemyName = localStorage.getItem('enemyName') || 'dron';
        
            this.dbName = 'CheetahGameDB';
            this.dbVersion = 1;
            this.db = null;
            this.playerImg = null;
            this.bgImg = null;
            this.playerName = localStorage.getItem('playerName') || 'لاعب';
            this.kills = parseInt(localStorage.getItem('totalKills')) || 0;
            
            this.LOGIC_WIDTH = 1280;
            this.LOGIC_HEIGHT = 720;
            
            this.playerScreenX = this.LOGIC_WIDTH / 2;
            this.playerScreenY = 480;
            this.facingRight = true;
            this.isAttacking = false;
            this.attackTimer = 0;
            
            this.groundMoving = true;
            this.groundSpeed = 300;
            this.groundOffsetX = 0;
            
            this.currentFrame = 0;
            this.walkFrame = 1;
            this.animTimer = 0;
            this.animSpeed = 0.12;
            this.useTopRow = 1;
            
            this.pinkSquare = {
                sourceX: 770 / 810,
                sourceY: 1175 / 1215,
                size: 40 / 810
            };
            
            this.canvas = document.getElementById('gameCanvas');
            this.ctx = this.canvas.getContext('2d');
            this.ctx.imageSmoothingEnabled = false;
            
            this.selectedTab = 0;
            this.selectedItems = { 0: null, 1: null, 2: null };
            this.imageData = { players: [], cities: [], enemies: [] };
            this.imageCache = {};
            this.dataLoaded = false;
            
            this.init();
        }
        
        async init() {
            // قراءة ملف البيانات أولاً
            await this.loadDataFile();
            
            await this.loadImagesFromStorage();
            this.setupControls();
            this.setupModal();
            this.resize();
            window.addEventListener('resize', () => this.resize());
            
            this.lastTime = 0;
            requestAnimationFrame((t) => this.loop(t));
        }
        
        // ===== قراءة ملف data_exhibition.txt =====
        async loadDataFile() {
            try {
                const response = await fetch('data_exhibition.txt');
                if (!response.ok) throw new Error('فشل تحميل ملف البيانات');
                
                const text = await response.text();
                this.parseDataFile(text);
                this.dataLoaded = true;
                console.log('✅ تم تحميل ملف البيانات:', this.imageData);
            } catch(e) {
                console.error('❌ خطأ في تحميل ملف البيانات:', e);
                // بيانات افتراضية في حالة فشل التحميل
                this.imageData = {
                    players: ['keven', 'razan'],
                    cities: ['city'],
                    enemies: ['dron']
                };
                this.dataLoaded = true;
            }
        }
        
        parseDataFile(text) {
            const lines = text.split('\n').map(line => line.trim()).filter(line => line.length > 0);
            let currentSection = null;
            const result = { players: [], cities: [], enemies: [] };
            
            for (const line of lines) {
                if (line === '#1#') {
                    currentSection = 'players';
                } else if (line === '#2#') {
                    currentSection = 'cities';
                } else if (line === '#3#') {
                    currentSection = 'enemies';
                } else if (currentSection && !line.startsWith('#')) {
                    result[currentSection].push(line);
                }
            }
            
            this.imageData = result;
        }
        
        resize() {
            this.scale = Math.min(window.innerWidth / this.LOGIC_WIDTH, window.innerHeight / this.LOGIC_HEIGHT);
            this.canvas.width = this.LOGIC_WIDTH * this.scale;
            this.canvas.height = this.LOGIC_HEIGHT * this.scale;
        }
        
async loadImagesFromStorage() {
    const infoDiv = document.getElementById('info');
    
    try {
        await this.openDB();
        
        // تحميل اللاعب
        let playerData = await this.loadImageFromStore('player', 'main');
        if (!playerData) playerData = localStorage.getItem('playerImage');
        
        if (playerData) {
            this.playerImg = new Image();
            this.playerImg.src = playerData;
            await new Promise(r => { if(this.playerImg.complete) r(); else this.playerImg.onload = r; });
            console.log('✅ صورة اللاعب تم تحميلها');
        } else {
            this.createDefaultPlayer();
            console.log('🎨 تم إنشاء لاعب افتراضي');
        }
        
        // تحميل الساحة
        let bgData = await this.loadImageFromStore('background', 'main');
        if (!bgData) bgData = localStorage.getItem('bgImage');
        
        if (bgData) {
            this.bgImg = new Image();
            this.bgImg.src = bgData;
            await new Promise(r => { if(this.bgImg.complete) r(); else this.bgImg.onload = r; });
            infoDiv.innerHTML = '';
        } else {
            infoDiv.innerHTML = '';
        }
        
        // تحميل العدو
        let enemyData = await this.loadImageFromStore('enemy', 'main');
        if (!enemyData) enemyData = localStorage.getItem('enemyImage');
        
        if (enemyData) {
            this.enemyImg = new Image();
            this.enemyImg.src = enemyData;
            await new Promise(r => { if(this.enemyImg.complete) r(); else this.enemyImg.onload = r; });
            this.enemyName = localStorage.getItem('enemyName') || 'dron';
            console.log('✅ صورة العدو تم تحميلها');
        } else {
            // إنشاء عدو افتراضي
            this.createDefaultEnemy();
            console.log('🎨 تم إنشاء عدو افتراضي');
        }
    } catch(e) {
        console.error(e);
        this.createDefaultPlayer();
        this.createDefaultEnemy();
        infoDiv.innerHTML = '';
    }
}
        
openDB() {
    return new Promise((resolve) => {
        const request = indexedDB.open(this.dbName, this.dbVersion);
        request.onerror = () => resolve();
        request.onsuccess = (e) => { this.db = e.target.result; resolve(); };
        request.onupgradeneeded = (e) => {
            const db = e.target.result;
            if (!db.objectStoreNames.contains('player')) db.createObjectStore('player', { keyPath: 'id' });
            if (!db.objectStoreNames.contains('background')) db.createObjectStore('background', { keyPath: 'id' });
            if (!db.objectStoreNames.contains('enemy')) db.createObjectStore('enemy', { keyPath: 'id' }); // ← إضافة
            resolve();
        };
    });
}
        createDefaultEnemy() {
    const canvas = document.createElement('canvas');
    canvas.width = 200;
    canvas.height = 200;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#e74c3c';
    ctx.fillRect(0, 0, 200, 200);
    ctx.fillStyle = '#c0392b';
    ctx.font = 'bold 80px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('👾', 100, 100);
    this.enemyImg = new Image();
    this.enemyImg.src = canvas.toDataURL();
    this.enemyName = 'dron';
}
        
        loadImageFromStore(storeName, imageId) {
            return new Promise((resolve) => {
                if (!this.db) { resolve(null); return; }
                try {
                    const tx = this.db.transaction([storeName], 'readonly');
                    const req = tx.objectStore(storeName).get(imageId);
                    req.onsuccess = () => resolve(req.result ? req.result.data : null);
                    req.onerror = () => resolve(null);
                } catch(e) { resolve(null); }
            });
        }
        
        createDefaultPlayer() {
            const canvas = document.createElement('canvas');
            canvas.width = 800;
            canvas.height = 200;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#f39c12';
            ctx.fillRect(0, 0, 800, 200);
            ctx.fillStyle = '#e67e22';
            for(let i = 0; i < 8; i++) ctx.fillRect(i * 100, 50, 80, 100);
            ctx.fillStyle = '#2c3e50';
            ctx.font = 'bold 36px Arial';
            ctx.fillText('🐆', 370, 130);
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 24px Arial';
            ctx.fillText('PLAYER', 340, 180);
            this.playerImg = new Image();
            this.playerImg.src = canvas.toDataURL();
        }
        
        setupControls() {
            const toggleBtn = document.getElementById('toggleAutoBtn');
            const attackBtn = document.getElementById('attackBtn');
            const selectBtn = document.getElementById('selectBtn');
            
            toggleBtn.onclick = () => {
                this.groundMoving = !this.groundMoving;
                toggleBtn.textContent = this.groundMoving ? 'stop' : 'go';
                toggleBtn.classList.toggle('running', this.groundMoving);
            };
            
            attackBtn.onpointerdown = () => {
                if(!this.isAttacking) {
                    this.isAttacking = true;
                    this.attackTimer = 0.25;
                    setTimeout(() => this.isAttacking = false, 250);
                }
            };
            
            selectBtn.onclick = () => {
                document.getElementById('modalOverlay').classList.add('active');
                this.renderModal();
            };
        }
        
        setupModal() {
            const overlay = document.getElementById('modalOverlay');
            const closeBtn = document.getElementById('modalClose');
            const applyBtn = document.getElementById('modalApply');
            const tabs = document.querySelectorAll('.modal-tab');
            
            closeBtn.onclick = () => overlay.classList.remove('active');
            overlay.onclick = (e) => { if(e.target === overlay) overlay.classList.remove('active'); };
            
            tabs.forEach(tab => {
                tab.onclick = () => {
                    tabs.forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    this.selectedTab = parseInt(tab.dataset.tab);
                    this.renderModal();
                };
            });
            
            applyBtn.onclick = () => this.applySelection();
        }
        
        getImagePath(category, name) {
            const folders = ['players', 'cities', 'enemies'];
            return `images/${folders[category]}/${name}.png`;
        }
        
async renderModal() {
    const content = document.getElementById('modalContent');
    const tab = this.selectedTab;
    
    const categories = ['players', 'cities', 'enemies'];
    const categoryKey = categories[tab];
    const items = this.imageData[categoryKey] || [];
    const selected = this.selectedItems[tab];
    
    if (!items || items.length === 0) {
        content.innerHTML = '<div class="modal-loading">📂 لا توجد صور في هذه القائمة</div>';
        return;
    }
    
    let html = '<div class="modal-grid">';
    
    for (const name of items) {
        // الصورة المرافقة تبدأ بـ _ (مثل _razan.png)
        const previewPath = `images/${categories[tab]}/_${name}.png`;
        // الصورة الأصلية للاستخدام الفعلي
        const actualPath = `images/${categories[tab]}/${name}.png`;
        const isSelected = (selected === name);
        
html += `
    <div class="modal-item ${isSelected ? 'selected' : ''}" data-name="${name}" data-path="${actualPath}" style="background-image: url('${previewPath}'); background-size: cover; background-position: center;">
        <span class="name">${name}</span>
    </div>
`;
    }
    
    html += '</div>';
    content.innerHTML = html;
    
    content.querySelectorAll('.modal-item').forEach(el => {
        el.onclick = () => {
            const name = el.dataset.name;
            content.querySelectorAll('.modal-item').forEach(i => i.classList.remove('selected'));
            el.classList.add('selected');
            this.selectedItems[tab] = name;
        };
    });
}
        
async applySelection() {
    const overlay = document.getElementById('modalOverlay');
    let playerChanged = false;
    let bgChanged = false;
    let enemyChanged = false;
    
    // اختيار اللاعب (تبويب 0)
    if (this.selectedItems[0]) {
        const name = this.selectedItems[0];
        const imgPath = this.getImagePath(0, name);
        try {
            const img = new Image();
            img.src = imgPath;
            await new Promise((r, rej) => {
                img.onload = r;
                img.onerror = () => rej(new Error('فشل تحميل الصورة'));
                setTimeout(rej, 5000);
            });
            
            this.playerImg = img;
            this.playerName = name;
            
            // حفظ في localStorage
            try {
                const canvas = document.createElement('canvas');
                canvas.width = img.naturalWidth || img.width;
                canvas.height = img.naturalHeight || img.height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0);
                const dataUrl = canvas.toDataURL('image/png');
                localStorage.setItem('playerImage', dataUrl);
                localStorage.setItem('playerName', name);
                console.log('💾 تم حفظ الشخصية في localStorage');
            } catch(e) {
                console.warn('⚠️ فشل حفظ الشخصية في localStorage:', e);
            }
            
            // حفظ في IndexedDB
            try {
                await this.saveImageToStore('player', 'main', imgPath);
                console.log('💾 تم حفظ الشخصية في IndexedDB');
            } catch(e) {
                console.warn('⚠️ فشل حفظ الشخصية في IndexedDB:', e);
            }
            
            playerChanged = true;
            console.log(`✅ تم استبدال الشخصية بـ: ${name}`);
        } catch(e) {
            console.error('❌ فشل تحميل الصورة:', e);
        }
    }
    
    // اختيار الساحة (تبويب 1)
    if (this.selectedItems[1]) {
        const name = this.selectedItems[1];
        const imgPath = this.getImagePath(1, name);
        try {
            const img = new Image();
            img.src = imgPath;
            await new Promise((r, rej) => {
                img.onload = r;
                img.onerror = () => rej(new Error('فشل تحميل الخلفية'));
                setTimeout(rej, 5000);
            });
            
            this.bgImg = img;
            
            // حفظ في localStorage
            try {
                const canvas = document.createElement('canvas');
                canvas.width = img.naturalWidth || img.width;
                canvas.height = img.naturalHeight || img.height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0);
                const dataUrl = canvas.toDataURL('image/png');
                localStorage.setItem('bgImage', dataUrl);
                console.log('💾 تم حفظ الساحة في localStorage');
            } catch(e) {
                console.warn('⚠️ فشل حفظ الساحة في localStorage:', e);
            }
            
            // حفظ في IndexedDB
            try {
                await this.saveImageToStore('background', 'main', imgPath);
                console.log('💾 تم حفظ الساحة في IndexedDB');
            } catch(e) {
                console.warn('⚠️ فشل حفظ الساحة في IndexedDB:', e);
            }
            
            bgChanged = true;
            console.log(`✅ تم استبدال الساحة بـ: ${name}`);
        } catch(e) {
            console.error('❌ فشل تحميل الخلفية:', e);
        }
    }
    
    // اختيار العدو (تبويب 2)
    if (this.selectedItems[2]) {
        const name = this.selectedItems[2];
        const imgPath = this.getImagePath(2, name);
        try {
            const img = new Image();
            img.src = imgPath;
            await new Promise((r, rej) => {
                img.onload = r;
                img.onerror = () => rej(new Error('فشل تحميل العدو'));
                setTimeout(rej, 5000);
            });
            
            this.enemyImg = img;
            this.enemyName = name;
            
            // حفظ في localStorage
            try {
                const canvas = document.createElement('canvas');
                canvas.width = img.naturalWidth || img.width;
                canvas.height = img.naturalHeight || img.height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0);
                const dataUrl = canvas.toDataURL('image/png');
                localStorage.setItem('enemyImage', dataUrl);
                localStorage.setItem('enemyName', name);
                console.log('💾 تم حفظ العدو في localStorage');
            } catch(e) {
                console.warn('⚠️ فشل حفظ العدو في localStorage:', e);
            }
            
            // حفظ في IndexedDB
            try {
                await this.saveImageToStore('enemy', 'main', imgPath);
                console.log('💾 تم حفظ العدو في IndexedDB');
            } catch(e) {
                console.warn('⚠️ فشل حفظ العدو في IndexedDB:', e);
            }
            
            enemyChanged = true;
            console.log(`✅ تم استبدال العدو بـ: ${name}`);
        } catch(e) {
            console.error('❌ فشل تحميل العدو:', e);
        }
    }
    
    // إعادة تعيين الرسوم لتحديث الشاشة فوراً
    if (playerChanged || bgChanged || enemyChanged) {
        this.currentFrame = 0;
        this.walkFrame = 1;
        this.animTimer = 0;
    }
    
    overlay.classList.remove('active');
}

// دالة جديدة لحفظ الصورة في IndexedDB
async saveImageToStore(storeName, imageId, imagePath) {
    return new Promise((resolve, reject) => {
        if (!this.db) {
            reject(new Error('قاعدة البيانات غير متاحة'));
            return;
        }
        
        try {
            // تحميل الصورة من المسار وتحويلها إلى base64
            fetch(imagePath)
                .then(response => {
                    if (!response.ok) throw new Error('فشل تحميل الصورة');
                    return response.blob();
                })
                .then(blob => {
                    return new Promise((resolveBlob) => {
                        const reader = new FileReader();
                        reader.onload = () => resolveBlob(reader.result);
                        reader.readAsDataURL(blob);
                    });
                })
                .then(dataUrl => {
                    const tx = this.db.transaction([storeName], 'readwrite');
                    const store = tx.objectStore(storeName);
                    const request = store.put({ id: imageId, data: dataUrl });
                    request.onsuccess = () => resolve();
                    request.onerror = () => reject(request.error);
                })
                .catch(reject);
        } catch(e) {
            reject(e);
        }
    });
}
        
        updateAnimation(dt) {
            let baseFrame = 0;
            
            if(this.isAttacking) {
                baseFrame = 7;
            } else if(this.groundMoving) {
                this.animTimer += dt;
                if(this.animTimer >= this.animSpeed) {
                    this.animTimer = 0;
                    this.walkFrame = (this.walkFrame % 4) + 1;
                }
                baseFrame = this.walkFrame;
            } else {
                baseFrame = 0;
                this.walkFrame = 1;
                this.animTimer = 0;
            }
            
            this.currentFrame = (this.useTopRow === 1) ? baseFrame : baseFrame + 8;
        }
        
        update(dt) {
            if(dt > 0.033) dt = 0.033;
            
            if(this.groundMoving) {
                this.groundOffsetX += this.groundSpeed * dt;
            }
            
            if(this.groundOffsetX > 1000000) {
                this.groundOffsetX = 0;
            }
            
            if(this.isAttacking) {
                this.attackTimer -= dt;
                if(this.attackTimer <= 0) this.isAttacking = false;
            }
            this.updateAnimation(dt);
        }
        
drawEnemy() {
    if(!this.enemyImg) return;
    
    this.ctx.save();
    
    // رسم العدو في أسفل وسط الشاشة (خلف الأرضية)
    const enemyX = this.LOGIC_WIDTH / 3; // 640
    const enemyY = 320; // أسفل الشاشة (فوق اللاعب بقليل)
    
    this.ctx.translate(enemyX, enemyY);
    
    // رسم العدو - نأخذ النصف السفلي فقط من الصورة
    if(this.enemyImg.complete && this.enemyImg.naturalWidth > 0) {
        const imgW = this.enemyImg.naturalWidth;
        const imgH = this.enemyImg.naturalHeight;
        
        // النصف السفلي: من y = imgH/2 إلى imgH
        const sourceX = 0;
        const sourceY = imgH / 2; // بداية النصف السفلي
        const sourceW = imgW;
        const sourceH = imgH / 2; // ارتفاع النصف السفلي
        
        // حجم الرسم (مربع)
        const drawSize = 400;
        
        this.ctx.drawImage(
            this.enemyImg, 
            sourceX, sourceY, sourceW, sourceH,  // مصدر الصورة (النصف السفلي)
            -drawSize/2, -drawSize/2, drawSize, drawSize  // الوجهة (مربع)
        );
    } else {
        // شكل افتراضي للعدو
        this.ctx.fillStyle = "#e74c3c";
        this.ctx.beginPath();
        this.ctx.arc(0, 0, 70, 0, Math.PI * 2);
        this.ctx.fill();
        this.ctx.fillStyle = "#c0392b";
        this.ctx.font = "bold 80px Arial";
        this.ctx.textAlign = "center";
        this.ctx.textBaseline = "middle";
        this.ctx.fillText('👾', 0, 0);
    }
    
    // اسم العدو
    if(this.enemyName && this.enemyName !== 'undefined') {
        this.ctx.fillStyle = "rgba(255,100,100,0.9)";
        this.ctx.font = "bold 16px Segoe UI";
        this.ctx.textAlign = "center";
        this.ctx.shadowBlur = 4;
        this.ctx.shadowColor = "black";
        this.ctx.fillText(`👾 ${this.enemyName}`, 0, -130);
    }
    
    this.ctx.restore();
}
        
        drawSky() {
            if(this.bgImg && this.bgImg.complete && this.bgImg.naturalWidth > 0) {
                const skyHeight = this.LOGIC_HEIGHT;
                const sourceHeight = this.bgImg.height / 2;
                
                this.ctx.drawImage(this.bgImg, 
                    0, 0, this.bgImg.width, sourceHeight,
                    0, 0, this.LOGIC_WIDTH, skyHeight * 1.3);
            } else {
                const grad = this.ctx.createLinearGradient(0, 0, 0, this.LOGIC_HEIGHT / 2);
                grad.addColorStop(0, '#1a1a2e');
                grad.addColorStop(1, '#2c3e66');
                this.ctx.fillStyle = grad;
                this.ctx.fillRect(0, 0, this.LOGIC_WIDTH, this.LOGIC_HEIGHT);
                
                this.ctx.fillStyle = '#fff';
                for(let i = 0; i < 80; i++) {
                    this.ctx.fillRect((i * 31) % this.LOGIC_WIDTH, (i * 17) % (this.LOGIC_HEIGHT / 2), 2, 2);
                }
            }
        }
        
        drawGround() {
            const groundY = -3600;
            const groundHeight = this.LOGIC_HEIGHT * 7.5;
            
            if(this.bgImg && this.bgImg.complete && this.bgImg.naturalWidth > 0) {
                const sourceY = this.bgImg.height / 2;
                const sourceHeight = this.bgImg.height / 2;
                const tileWidth = this.bgImg.width * 5;
                
                const startX = -(this.groundOffsetX % tileWidth);
                
                for(let i = -2; i <= 4; i++) {
                    const x = startX + (i * tileWidth);
                    this.ctx.drawImage(this.bgImg, 
                        0, sourceY, this.bgImg.width, sourceHeight,
                        x, groundY, tileWidth, groundHeight);
                }
                
                this.ctx.drawImage(this.bgImg, 
                    this.pinkSquare.sourceX * this.bgImg.width, 
                    this.pinkSquare.sourceY * this.bgImg.height, 
                    this.pinkSquare.size * this.bgImg.width, 
                    this.pinkSquare.size * this.bgImg.width, 
                    this.playerScreenX + 35, this.playerScreenY - 15, 30, 30);
            } else {
                const tileWidth = 100;
                const startX = -(this.groundOffsetX % tileWidth);
                
                this.ctx.fillStyle = '#0f3460';
                this.ctx.fillRect(0, groundY, this.LOGIC_WIDTH, groundHeight);
                
                this.ctx.fillStyle = '#1a5276';
                for(let i = -2; i <= 16; i++) {
                    const x = startX + (i * tileWidth);
                    this.ctx.fillRect(x, groundY + 20, 60, 8);
                    this.ctx.fillRect(x, groundY + 60, 60, 8);
                    this.ctx.fillRect(x, groundY + 100, 60, 8);
                }
            }
            

        }
        
        drawPlayer() {
            if(!this.playerImg) return;
            
            this.ctx.save();
            
            this.ctx.translate(this.playerScreenX, this.playerScreenY);
            
            if(!this.facingRight) this.ctx.scale(-1, 1);
            
            if(this.playerName && this.playerName !== 'undefined') {
                this.ctx.fillStyle = "rgba(255,255,255,0.9)";
                this.ctx.font = "bold 30px Segoe UI";
                this.ctx.textAlign = "center";
                this.ctx.shadowBlur = 4;
                this.ctx.shadowColor = "black";
                this.ctx.fillText(this.playerName, 0, -160);
            }
            
            if(this.playerImg.complete && this.playerImg.naturalWidth > 0) {
                const framesX = 8, framesY = 2;
                const frameW = this.playerImg.naturalWidth / framesX;
                const frameH = this.playerImg.naturalHeight / framesY;
                const frameCol = this.currentFrame % framesX;
                const frameRow = Math.floor(this.currentFrame / framesX) % framesY;
                const frameX = frameCol * frameW;
                const frameY = frameRow * frameH;
                
                this.ctx.drawImage(this.playerImg, frameX, frameY, frameW, frameH, -150, -150, 300, 300);
            } else {
                this.ctx.fillStyle = "#f39c12";
                this.ctx.beginPath();
                this.ctx.arc(0, 0, 50, 0, Math.PI * 2);
                this.ctx.fill();
                this.ctx.fillStyle = "#2c3e50";
                this.ctx.fillRect(-20, -30, 40, 20);
                this.ctx.fillStyle = "#fff";
                this.ctx.fillRect(-15, -40, 10, 10);
                this.ctx.fillRect(5, -40, 10, 10);
            }
            
            this.ctx.restore();
        }
        
        draw() {
            this.ctx.setTransform(this.scale, 0, 0, this.scale, 0, 0);
            this.ctx.imageSmoothingEnabled = false;
            this.ctx.clearRect(0, 0, this.LOGIC_WIDTH, this.LOGIC_HEIGHT);
            
            this.drawSky();
            this.drawEnemy();
            this.drawGround();
            this.drawPlayer();
            
            if(this.isAttacking) {
                this.ctx.save();
                this.ctx.beginPath();
                let offsetX = this.facingRight ? 100 : -100;
                this.ctx.arc(this.playerScreenX + offsetX, this.playerScreenY, 120, 0, Math.PI * 2);
                this.ctx.fillStyle = "rgba(231,76,60,0.35)";
                this.ctx.fill();
                this.ctx.strokeStyle = "#ff6600";
                this.ctx.lineWidth = 4;
                this.ctx.beginPath();
                this.ctx.arc(this.playerScreenX + offsetX, this.playerScreenY, 120, 0, Math.PI * 2);
                this.ctx.stroke();
                this.ctx.restore();
            }
            
            this.ctx.setTransform(1, 0, 0, 1, 0, 0);
            this.ctx.font = "12px monospace";
            this.ctx.fillStyle = "#aaa";
            this.ctx.fillText(`إزاحة الأرض: ${Math.floor(this.groundOffsetX)} | سرعة الأرض: ${this.groundSpeed}`, 15, 30);
            this.ctx.fillStyle = "#f39c12";
            this.ctx.fillText(`🎯 اللاعب ثابت | الإطار: ${this.currentFrame}`, 15, 55);
            
            if(this.playerImg) {
                this.ctx.fillStyle = "#27ae60";
                this.ctx.fillText(`✅ صورة اللاعب: ${this.playerImg.width}x${this.playerImg.height}`, 15, 80);
            }
        }
        
        loop(timestamp) {
            if (!this.lastTime) {
                this.lastTime = timestamp;
                requestAnimationFrame((t) => this.loop(t));
                return;
            }
            
            let dt = Math.min(0.033, (timestamp - this.lastTime) / 1000);
            this.lastTime = timestamp;
            
            this.update(dt);
            this.draw();
            
            requestAnimationFrame((t) => this.loop(t));
        }
    }
    
    window.addEventListener('load', () => new GameViewer());
</script>
