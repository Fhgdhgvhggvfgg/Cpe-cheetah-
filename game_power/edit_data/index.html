<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>حفظ بيانات اللعبة</title>
    <style>
        body {
            background: black;
            color: #0f0;
            font-family: monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        div {
            background: #000;
            border: 1px solid #0f0;
            padding: 20px;
            text-align: center;
        }
        input, button {
            background: #000;
            color: #0f0;
            border: 1px solid #0f0;
            padding: 8px;
            margin: 5px;
            font-family: monospace;
        }
        button {
            cursor: pointer;
        }
    </style>
</head>
<body>
<div>
    <h3>البيانات كالتالي:</h3>
        <h3>this.speed = 450;</h3>
        <h3>this.dash_s = 1500;</h3>
         <h3>this.damage_p = 100;</h3>
         <h3>this.radius_dp = 170;</h3>
         <h3>this.jumpForce = -790;</h3>
             <h3>انسخ هذه السطور واطبعها في ملف data_g.txt وغير ما تريده من الارقام وادخله هنا:</h3>
    <input type="file" id="fileInput" accept=".txt">
    <div id="msg" style="margin-top:10px; font-size:12px;"></div>
</div>

<script>
    document.getElementById('fileInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(ev) {
            const content = ev.target.result;

            // استخراج جميع القيم (تدعم السالب)
            const speed = content.match(/this\.speed\s*=\s*(-?\d+(?:\.\d+)?)/i)?.[1];
            const dash_s = content.match(/this\.dash_s\s*=\s*(-?\d+(?:\.\d+)?)/i)?.[1];
            const damage_p = content.match(/this\.damage_p\s*=\s*(-?\d+(?:\.\d+)?)/i)?.[1];
            const radius_dp = content.match(/this\.radius_dp\s*=\s*(-?\d+(?:\.\d+)?)/i)?.[1];
            const jumpForce = content.match(/this\.jumpForce\s*=\s*(-?\d+(?:\.\d+)?)/i)?.[1];

            // حفظ القيم في localStorage (كمفاتيح تطابق StorageManager)
            if (speed !== undefined) localStorage.setItem('playerSpeed', parseFloat(speed));
            if (dash_s !== undefined) localStorage.setItem('playerDashSpeed', parseFloat(dash_s));
            if (damage_p !== undefined) localStorage.setItem('playerDamage', parseFloat(damage_p));
            if (radius_dp !== undefined) localStorage.setItem('damageRadius', parseFloat(radius_dp));
            if (jumpForce !== undefined) localStorage.setItem('playerJumpForce', parseFloat(jumpForce));

            // عرض النتيجة
            const savedCount = [speed, dash_s, damage_p, radius_dp, jumpForce].filter(v => v !== undefined).length;
            document.getElementById('msg').innerHTML = `✅ تم تحديث ${savedCount} متغير في localStorage`;

            // تأكيد القيم من localStorage
            console.log({
                speed: localStorage.getItem('playerSpeed'),
                dash_s: localStorage.getItem('playerDashSpeed'),
                damage_p: localStorage.getItem('playerDamage'),
                radius_dp: localStorage.getItem('damageRadius'),
                jumpForce: localStorage.getItem('playerJumpForce')
            });
        };
        reader.readAsText(file);
    });
</script>
</body>
</html>
