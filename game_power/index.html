<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <title>Cheetah Engine - 8帧动画系统</title>
    <style>
        :root { --primary: #3498db; --success: #27ae60; --danger: #e74c3c; --warning: #f39c12; --dark: #1a1a1a; --repo-orange: #d38345; }
        body { margin: 0; padding: 0; background: #000; color: white; font-family: 'Segoe UI', sans-serif; height: 100vh; width: 100vw; overflow: hidden; touch-action: none; }
        #mainMenu { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #0a0a0a; z-index: 100; gap: 10px; }
        #customizerOverlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 200; backdrop-filter: blur(10px); }
        .config-card { background: var(--dark); padding: 30px; border-radius: 25px; border: 1px solid #333; width: 90%; max-width: 450px; text-align: center; }
        .repo-btn { background: var(--repo-orange); color: white; padding: 15px; border-radius: 12px; display: flex; align-items: center; justify-content: center; gap: 10px; text-decoration: none; font-weight: bold; margin-bottom: 20px; transition: 0.3s; width: 100%; box-sizing: border-box; }
        .menu-btn { padding: 12px 25px; font-size: 16px; cursor: pointer; border: none; border-radius: 12px; color: white; font-weight: bold; width: 250px; transition: 0.3s; display: block; text-align: center; text-decoration: none; margin: 5px auto; }
        #gameCanvas { display: none; background: #000; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); }
        #uiLayer { position: fixed; inset: 0; z-index: 50; pointer-events: none; display: none; }
        #exitBtn, #clearBtn { position: absolute; top: 15px; padding: 8px 15px; color: white; border: none; border-radius: 8px; font-weight: bold; pointer-events: auto; }
        #exitBtn { right: 15px; background: var(--danger); }
        #clearBtn { left: 15px; background: var(--warning); }
        
        .controls { position: absolute; bottom: 30px; width: 100%; display: flex; flex-direction: row-reverse; justify-content: space-between; padding: 0 20px; box-sizing: border-box; }
        .control-btn { width: 75px; height: 75px; background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255,255,255,0.3); border-radius: 50%; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(5px); pointer-events: auto; transition: opacity 0.2s; }
        
        #healthBarContainer { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); width: 200px; height: 10px; background: #222; border-radius: 5px; overflow: hidden; display: none; }
        #healthBar { height: 100%; background: var(--danger); width: 100%; transition: 0.2s; }
        
        .preview-container { display: flex; gap: 15px; justify-content: center; margin-bottom: 20px; }
        .preview-wrapper { display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .preview-label { font-size: 14px; font-weight: bold; color: #bbb; }
        .preview-box { width: 80px; height: 80px; border: 2px dashed #444; border-radius: 15px; overflow: hidden; background: #000; display: flex; align-items: center; justify-content: center; cursor: pointer; position: relative; }
        .preview-box img { max-width: 90%; max-height: 90%; object-fit: contain; }

        .progress-container { width: 100%; background-color: #333; border-radius: 10px; margin: 10px 0; display: none; }
        .progress-bar { width: 0%; height: 8px; background-color: var(--success); border-radius: 10px; transition: width 0.1s; box-shadow: 0 0 10px var(--success); }
        
        .slider-container { margin: 20px 0; text-align: right; }
        .slider-label { font-size: 14px; color: #bbb; display: block; margin-bottom: 8px; }
        input[type="range"] { width: 100%; cursor: pointer; accent-color: var(--primary); }

        input[type="file"] { display: none; }
        #killCountDisplay { color: #e74c3c; font-weight: bold; font-size: 18px; margin-bottom: 15px; white-space: pre-wrap; text-align: center; }
        
        .info-badge { position: fixed; bottom: 10px; left: 10px; background: rgba(0,0,0,0.6); padding: 5px 10px; border-radius: 8px; font-size: 10px; color: #888; z-index: 300; pointer-events: none; }
    </style>
</head>
<body>

    <div id="mainMenu">
        <h1 style="font-size: 40px; margin-bottom: 0;">Cheetah Engine 🐾</h1>
<p style="font-size: 20px; color: #aaa; margin-top: 5px; margin-bottom: 6px;">ادخل لتغيير صور الساحة</p>        <p id="killCountDisplay"></p>
        <button class="menu-btn" style="background:var(--danger)" id="survivalBtn">وضع البقاء (Survival)</button>
        <button class="menu-btn" style="background:var(--success)" id="creativeBtn">وضع البناء (Creative)</button>
        <button class="menu-btn" style="background:var(--primary)" id="openCustomizer">تغيير صور الساحة</button>
    </div>

    <div id="customizerOverlay">
        <div class="config-card">
            <h2 style="margin-top:0;">🐾 studeo cheetah 🐾 </h2>
            
            <a href="https://www.mediafire.com/folder/b13hcdpufhlc6/assets+power" target="_blank" class="repo-btn"><span>📂</span> تحميل الملحقات</a>
            <div class="preview-container">
                <div class="preview-wrapper">
                    <label for="playerLoader"><div class="preview-box"><img id="playerPreview" src=""></div></label>
                    <span class="preview-label"> اللاعب</span>
                </div>
                <div class="preview-wrapper">
                    <label for="enemyLoader"><div class="preview-box"><img id="enemyPreview" src=""></div></label>
                    <span class="preview-label">العدو</span>
                </div>
                <div class="preview-wrapper">
                    <label for="bgLoader"><div class="preview-box"><img id="bgPreview" src=""></div></label>
                    <span class="preview-label">الساحة</span>
                </div>
            </div>
            
            <div class="slider-container">
                <span class="slider-label">حجم أزرار التحكم. انتضر لتحميل الصور! : <span id="sizeVal">75</span>px</span>
                <input type="range" id="btnSizeSlider" min="50" max="200" value="75">
            </div>

            <div class="progress-container" id="progCont"><div class="progress-bar" id="progBar"></div></div>
            
            <input type="file" id="playerLoader" accept="image/*">
            <input type="file" id="enemyLoader" accept="image/*">
            <input type="file" id="bgLoader" accept="image/*">
            <button class="menu-btn" style="background:var(--success); width:100%;" onclick="location.reload()">حفظ وتحديث</button>
            <button class="menu-btn" style="background:var(--danger); width:100%;" id="closeCustomizer">إلغاء</button>
        </div>
    </div>

    <div id="uiLayer">
        <div id="healthBarContainer"><div id="healthBar"></div></div>
        <button id="exitBtn">خروج</button>
        <button id="clearBtn">مسح</button>
        <div class="controls">
            <div style="display: flex; gap: 10px;"><button class="control-btn" id="rightBtn"></button><button class="control-btn" id="leftBtn"></button></div>
            <div style="display: flex; gap: 10px;">
                <button class="control-btn" id="attackBtn" style="background:rgba(231,76,60,0.4)"></button>
                <button class="control-btn" id="dashBtn" style="background:rgba(243,156,18,0.4)"></button>
                <button class="control-btn" id="jumpBtn" style="background:rgba(39,174,96,0.4)"></button>
            </div>
        </div>
    </div>
    <div class="info-badge">🎬 8-Frame Animation System</div>

    <canvas id="gameCanvas"></canvas>

<script>
    // دالة لتحميل الصورة من مسار معين وإرجاعها كـ DataURL
    async function loadImageAsDataURL(path) {
        try {
            const response = await fetch(path);
            if (!response.ok) return null;
            const blob = await response.blob();
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onloadend = () => resolve(reader.result);
                reader.readAsDataURL(blob);
            });
        } catch(e) { return null; }
    }

    // تهيئة التخزين مع البحث التلقائي عن الصور
    (async function initStorage() {
        // محاولة تحميل الصور من الملفات المحلية
        const playerData = await loadImageAsDataURL('player.png');
        const bgData = await loadImageAsDataURL('screen.png');
        const enemyData = await loadImageAsDataURL('enemy.png');
        
        // إذا كانت الصور موجودة، احفظها في localStorage
        if (playerData && !localStorage.getItem('playerImage')) {
            localStorage.setItem('playerImage', playerData);
            console.log('✅ تم تحميل player.png تلقائياً');
        }
        if (bgData && !localStorage.getItem('bgImage')) {
            localStorage.setItem('bgImage', bgData);
            console.log('✅ تم تحميل screen.png تلقائياً');
        }
        if (enemyData && !localStorage.getItem('enemyImage')) {
            localStorage.setItem('enemyImage', enemyData);
            console.log('✅ تم تحميل enemy.png تلقائياً');
        }
        
        // إعداد الصور الاحتياطية الافتراضية (fallback)
        if (!localStorage.getItem('playerImage')) {
            const canvas = document.createElement('canvas');
            canvas.width = 800; canvas.height = 100;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#f39c12';
            ctx.fillRect(0, 0, 800, 100);
            ctx.fillStyle = 'white';
            ctx.font = 'bold 20px Arial';
            ctx.fillText('PLAYER (8 Frames)', 300, 60);
            localStorage.setItem('playerImage', canvas.toDataURL());
        }
        
        if (!localStorage.getItem('bgImage')) {
            const canvas = document.createElement('canvas');
            canvas.width = 1920; canvas.height = 1080;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#1a472a';
            ctx.fillRect(0, 0, 1920, 1080);
            ctx.fillStyle = '#2d6a4f';
            for(let i=0; i<200; i++) ctx.fillRect(Math.random()*1920, Math.random()*1080, 20, 20);
            localStorage.setItem('bgImage', canvas.toDataURL());
        }
        
        if (!localStorage.getItem('enemyImage')) {
            const canvas = document.createElement('canvas');
            canvas.width = 100; canvas.height = 100;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#e74c3c';
            ctx.beginPath();
            ctx.arc(50, 50, 40, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = 'white';
            ctx.font = 'bold 16px Arial';
            ctx.fillText('ENEMY', 20, 55);
            localStorage.setItem('enemyImage', canvas.toDataURL());
        }
        
        // تحديث المعاينات
        document.getElementById('playerPreview').src = localStorage.getItem('playerImage');
        document.getElementById('bgPreview').src = localStorage.getItem('bgImage');
        document.getElementById('enemyPreview').src = localStorage.getItem('enemyImage');
        
        // تحميل الصور في الكائنات العامة
        playerImgObj.src = localStorage.getItem('playerImage');
        bgImgObj.src = localStorage.getItem('bgImage');
        enemyImgObj.src = localStorage.getItem('enemyImage');
    })();

    const storage = {
        player: localStorage.getItem('playerImage'), 
        bg: localStorage.getItem('bgImage'),
        enemy: localStorage.getItem('enemyImage'),
        platforms: JSON.parse(localStorage.getItem('gamePlatforms') || "[]"),
        lastX: parseFloat(localStorage.getItem('playerLastX')) || 400,
        lastY: parseFloat(localStorage.getItem('playerLastY')) || 1400,
        kills: parseInt(localStorage.getItem('totalKills')) || 0,
        btnSize: localStorage.getItem('controlsSize') || 75
    };

    const playerImgObj = new Image(); 
    const bgImgObj = new Image(); 
    const enemyImgObj = new Image(); 

    function updateMenuDisplay() {
        document.getElementById('killCountDisplay').innerHTML = storage.kills > 0 ? "آخر نتيجة قتال: " + storage.kills : "اضغط الشاشة تبني اضغط المربع تهدم. ";
    }
    updateMenuDisplay();

    function applyBtnSize(size) {
        document.querySelectorAll('.control-btn').forEach(btn => {
            btn.style.width = size + 'px'; btn.style.height = size + 'px';
        });
    }
    applyBtnSize(storage.btnSize);

    const slider = document.getElementById('btnSizeSlider');
    const sizeVal = document.getElementById('sizeVal');
    slider.value = storage.btnSize; sizeVal.innerText = storage.btnSize;
    slider.oninput = function() {
        sizeVal.innerText = this.value; applyBtnSize(this.value);
        localStorage.setItem('controlsSize', this.value);
    }

    class GameCore {
        constructor(mode) {
            this.mode = mode;
            this.canvas = document.getElementById('gameCanvas');
            this.ctx = this.canvas.getContext('2d');
            this.LOGIC_WIDTH = 1280; this.LOGIC_HEIGHT = 720;
            this.x = storage.lastX; this.y = storage.lastY;
            this.playerHealth = 100; this.maxHealth = 100;
            this.enemies = []; this.enemySpawnTimer = 0;
            this.speed = 450; this.gravity = 1340; this.jumpForce = -650;
            this.velocityY = 0; this.moveDir = 0; this.facingRight = true;
            this.groundY = 1200; this.radius = 60; this.jumpCount = 0;
            this.zoom = 1.5; this.camX = this.x; this.camY = this.y;
            this.isDashing = false; this.canDash = true;
            this.isAttacking = false; this.attackTime = 0;
            this.canAttack = true; 
            this.platforms = storage.platforms;
            this.isDead = false; this.lastTimestamp = 0;
            
            // نظام الإطارات المتحركة
            this.currentFrame = 0;
            this.animTimer = 0;
            this.animSpeed = 0.12;
            this.walkFrame = 1;
            this.lastWasMoving = false;
            
            this.init();
        }

        init() {
            document.getElementById('mainMenu').style.display = 'none';
            document.getElementById('gameCanvas').style.display = 'block';
            document.getElementById('uiLayer').style.display = 'block';
            if(this.mode === 'survival') document.getElementById('healthBarContainer').style.display = 'block';
            window.addEventListener('resize', () => this.resize());
            this.resize(); this.bindControls();
            requestAnimationFrame((t) => this.loop(t));
        }

        resize() {
            this.scale = Math.min(window.innerWidth / this.LOGIC_WIDTH, window.innerHeight / this.LOGIC_HEIGHT);
            this.canvas.width = this.LOGIC_WIDTH * this.scale;
            this.canvas.height = this.LOGIC_HEIGHT * this.scale;
        }

        spawnEnemy() {
            if (this.mode !== 'survival' || this.isDead) return;
            const side = Math.random() > 0.5 ? 1 : -1;
            this.enemies.push({ x: this.x + (side * 500), y: this.y - 100, health: 50, maxHealth: 50, radius: 45, speed: 200 });
        }

        updateAnimation(dt, isMoving) {
            if (this.isAttacking) {
                this.currentFrame = 7;
                return;
            }
            if (this.isDashing) {
                this.currentFrame = 6;
                return;
            }
            if (Math.abs(this.velocityY) > 50 || this.jumpCount > 0) {
                this.currentFrame = 5;
                return;
            }
            if (isMoving && this.moveDir !== 0) {
                this.animTimer += dt;
                if (this.animTimer >= this.animSpeed) {
                    this.animTimer = 0;
                    this.walkFrame = (this.walkFrame % 4) + 1;
                }
                this.currentFrame = this.walkFrame;
                return;
            }
            this.currentFrame = 0;
            this.walkFrame = 1;
            this.animTimer = 0;
        }

        bindControls() {
            const btn = (id, down, up) => {
                const el = document.getElementById(id);
                if(el) {
                    el.onpointerdown = (e) => { e.preventDefault(); if(!this.isDead) down(); };
                    if(up) el.onpointerup = (e) => { e.preventDefault(); up(); };
                }
            };
            btn('leftBtn', () => { this.moveDir = -1; this.facingRight = false; }, () => this.moveDir = 0);
            btn('rightBtn', () => { this.moveDir = 1; this.facingRight = true; }, () => this.moveDir = 0);
            btn('jumpBtn', () => { 
                if(this.jumpCount < 2 && !this.isDead) { 
                    this.velocityY = this.jumpForce; 
                    this.jumpCount++; 
                } 
            });
            btn('dashBtn', () => { 
                if (this.canDash && !this.isDead) { 
                    this.isDashing = true; 
                    this.canDash = false; 
                    setTimeout(() => this.isDashing = false, 200); 
                    setTimeout(() => this.canDash = true, 760); 
                } 
            });
            btn('attackBtn', () => { 
                if (this.canAttack && !this.isDead) {
                    this.isAttacking = true; 
                    this.attackTime = 0.3; 
                    this.canAttack = false;
                    document.getElementById('attackBtn').style.opacity = "0.3"; 
                    setTimeout(() => { 
                        this.canAttack = true; 
                        document.getElementById('attackBtn').style.opacity = "1"; 
                    }, 600); 
                }
            });

            this.canvas.onpointerdown = (e) => {
                if(this.isDead) return;
                const rect = this.canvas.getBoundingClientRect();
                const mx = (e.clientX - rect.left) / (this.scale * this.zoom) + this.camX - (this.LOGIC_WIDTH / (2 * this.zoom));
                const my = (e.clientY - rect.top) / (this.scale * this.zoom) + this.camY - (this.LOGIC_HEIGHT / (2 * this.zoom));
                const gx = Math.floor(mx/60)*60, gy = Math.floor(my/60)*60;
                const idx = this.platforms.findIndex(p => p.x === gx && p.y === gy);
                if (idx !== -1) this.platforms.splice(idx, 1);
                else this.platforms.push({x: gx, y: gy});
            };

            document.getElementById('exitBtn').onclick = () => { localStorage.setItem('playerLastX', this.x); localStorage.setItem('playerLastY', this.y); localStorage.setItem('gamePlatforms', JSON.stringify(this.platforms)); location.reload(); };
            document.getElementById('clearBtn').onclick = () => { localStorage.removeItem('gamePlatforms'); location.reload(); };
        }

        update(dt) {
            if (dt > 0.1) dt = 0.1; 
            if (this.isDead) return;
            
            let moveSpeed = this.isDashing ? 1200 : this.speed;
            let effectiveDir = this.isDashing ? (this.facingRight ? 1 : -1) : this.moveDir;
            let nx = this.x + (effectiveDir * moveSpeed) * dt;
            let ny = this.y + this.velocityY * dt;
            
            if (this.isDashing) {
                this.velocityY = 0; 
            } else {
                this.velocityY += this.gravity * dt;
            }

            this.platforms.forEach(p => {
                const pL = p.x, pR = p.x + 60, pT = p.y, pB = p.y + 60;
                if (nx + 45 > pL && nx - 45 < pR && ny + 45 > pT && ny - 45 < pB) {
                    const oL = (nx + 45) - pL, oR = pR - (nx - 45), oT = (ny + 45) - pT, oB = pB - (ny - 45);
                    const min = Math.min(oL, oR, oT, oB);
                    if (min === oT && this.velocityY > 0) { ny = pT - 45; this.velocityY = 0; this.jumpCount = 0; }
                    else if (min === oB && this.velocityY < 0) { ny = pB + 45; this.velocityY = 0; }
                    else if (min === oL) nx = pL - 45;
                    else if (min === oR) nx = pR + 45;
                }
            });

            this.x = nx; this.y = ny;
            if (this.x < -1550) this.x = -1550;
            if (this.x > 5500) this.x = 5500;
            if (this.y >= this.groundY) { this.y = this.groundY; this.velocityY = 0; this.jumpCount = 0; }

            const isMoving = this.moveDir !== 0 && !this.isDashing && !this.isAttacking;
            this.updateAnimation(dt, isMoving);
            
            if (this.isAttacking) { 
                this.attackTime -= dt; 
                if (this.attackTime <= 0) this.isAttacking = false; 
            }

            if (this.mode === 'survival') {
                this.enemySpawnTimer += dt;
                if (this.enemySpawnTimer > 4) { this.spawnEnemy(); this.enemySpawnTimer = 0; }
                this.enemies.forEach((en, idx) => {
                    const dx = this.x - en.x, dy = this.y - en.y, dist = Math.sqrt(dx*dx + dy*dy);
                    en.x += (dx/dist) * en.speed * dt; en.y += (dy/dist) * en.speed * dt;
                    if (dist < this.radius + en.radius) {
                        this.playerHealth -= 20 * dt;
                        document.getElementById('healthBar').style.width = (this.playerHealth/this.maxHealth)*100 + "%";
                        if(this.playerHealth <= 0) { this.isDead = true; setTimeout(() => location.reload(), 1000); }
                    }
                    if (this.isAttacking && dist < 170) { en.health -= 100 * dt; if(en.health <= 0) { this.enemies.splice(idx, 1); storage.kills++; localStorage.setItem('totalKills', storage.kills); } }
                });
            }
            
            this.camX += (this.x - this.camX) * 0.1; 
            this.camY += (this.y - this.camY) * 0.1;
        }

        drawPlayer() {
            if (this.isDead) return;
            
            this.ctx.save();
            this.ctx.translate(this.x, this.y);
            if(!this.facingRight) this.ctx.scale(-1, 1);
            
            if(storage.player && playerImgObj.complete && playerImgObj.naturalWidth > 0) {
                const frameW = playerImgObj.naturalWidth / 8;
                const frameH = playerImgObj.naturalHeight;
                const sx = this.currentFrame * frameW;
                const sy = 0;
                this.ctx.drawImage(playerImgObj, sx, sy, frameW, frameH, -75, -75, 150, 150);
            } else {
                this.ctx.fillStyle = "#f39c12"; 
                this.ctx.beginPath(); 
                this.ctx.arc(0, 0, 45, 0, Math.PI * 2); 
                this.ctx.fill();
                this.ctx.fillStyle = "white";
                this.ctx.font = "bold 20px Arial";
                this.ctx.fillText(this.currentFrame, -15, 10);
            }
            this.ctx.restore();
        }

        draw() {
            const s = this.scale * this.zoom;
            this.ctx.setTransform(s, 0, 0, s, 0, 0);
            this.ctx.clearRect(0, 0, this.LOGIC_WIDTH, this.LOGIC_HEIGHT);
            this.ctx.save();
            this.ctx.translate(-this.camX + (this.LOGIC_WIDTH / (2 * this.zoom)), -this.camY + (this.LOGIC_HEIGHT / (2 * this.zoom)));

            if(bgImgObj.complete && storage.bg) { 
                const drawW = 850, drawH = 1133;
                let startX = this.camX - (this.LOGIC_WIDTH / (2 * this.zoom));
                let startY = this.camY - (this.LOGIC_HEIGHT / (2 * this.zoom));
                for(let i = 0; i < 3; i++) {
                    this.ctx.drawImage(bgImgObj, 0, 0, bgImgObj.width, bgImgObj.height / 2, startX + (i * drawW) - drawW, startY + 0, drawW, drawH / 2);
                }
                const drawW2 = 3240, drawH2 = 4320;
                for(let i=-2000; i<6000; i+=(drawW2 - 1) ) this.ctx.drawImage(bgImgObj, 0, bgImgObj.height / 2, bgImgObj.width, bgImgObj.height / 2, i, -2600 + (drawH2 / 2), drawW2, drawH2 / 2);
            }

            this.ctx.fillStyle = "rgba(52, 152, 219, 0.6)";
            this.platforms.forEach(p => this.ctx.fillRect(p.x, p.y, 60, 60));

            this.enemies.forEach(en => {
                this.ctx.save();
                this.ctx.translate(en.x, en.y);
                if (this.x < en.x) this.ctx.scale(-1, 1);
                if(storage.enemy && enemyImgObj.complete) {
                    this.ctx.drawImage(enemyImgObj, -en.radius, -en.radius, en.radius * 2, en.radius * 2);
                } else {
                    this.ctx.fillStyle = "#e67e22"; this.ctx.beginPath(); this.ctx.arc(0, 0, en.radius, 0, Math.PI*2); this.ctx.fill();
                }
                this.ctx.restore();
                const barWidth = 60; this.ctx.fillStyle = "#222"; this.ctx.fillRect(en.x - barWidth/2, en.y - en.radius - 15, barWidth, 6);

<script>
    // دالة لتحميل الصورة من مسار معين وإرجاعها كـ DataURL
    async function loadImageAsDataURL(path) {
        try {
            const response = await fetch(path);
            if (!response.ok) return null;
            const blob = await response.blob();
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onloadend = () => resolve(reader.result);
                reader.readAsDataURL(blob);
            });
        } catch(e) { return null; }
    }

    // تهيئة التخزين مع البحث التلقائي عن الصور
    (async function initStorage() {
        // محاولة تحميل الصور من الملفات المحلية
        const playerData = await loadImageAsDataURL('player.png');
        const bgData = await loadImageAsDataURL('screen.png');
        const enemyData = await loadImageAsDataURL('enemy.png');
        
        // إذا كانت الصور موجودة، احفظها في localStorage
        if (playerData && !localStorage.getItem('playerImage')) {
            localStorage.setItem('playerImage', playerData);
            console.log('✅ تم تحميل player.png تلقائياً');
        }
        if (bgData && !localStorage.getItem('bgImage')) {
            localStorage.setItem('bgImage', bgData);
            console.log('✅ تم تحميل screen.png تلقائياً');
        }
        if (enemyData && !localStorage.getItem('enemyImage')) {
            localStorage.setItem('enemyImage', enemyData);
            console.log('✅ تم تحميل enemy.png تلقائياً');
        }
        
        // إعداد الصور الاحتياطية الافتراضية (fallback)
        if (!localStorage.getItem('playerImage')) {
            const canvas = document.createElement('canvas');
            canvas.width = 800; canvas.height = 100;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#f39c12';
            ctx.fillRect(0, 0, 800, 100);
            ctx.fillStyle = 'white';
            ctx.font = 'bold 20px Arial';
            ctx.fillText('PLAYER (8 Frames)', 300, 60);
            localStorage.setItem('playerImage', canvas.toDataURL());
        }
        
        if (!localStorage.getItem('bgImage')) {
            const canvas = document.createElement('canvas');
            canvas.width = 1920; canvas.height = 1080;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#1a472a';
            ctx.fillRect(0, 0, 1920, 1080);
            ctx.fillStyle = '#2d6a4f';
            for(let i=0; i<200; i++) ctx.fillRect(Math.random()*1920, Math.random()*1080, 20, 20);
            localStorage.setItem('bgImage', canvas.toDataURL());
        }
        
        if (!localStorage.getItem('enemyImage')) {
            const canvas = document.createElement('canvas');
            canvas.width = 100; canvas.height = 100;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#e74c3c';
            ctx.beginPath();
            ctx.arc(50, 50, 40, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = 'white';
            ctx.font = 'bold 16px Arial';
            ctx.fillText('ENEMY', 20, 55);
            localStorage.setItem('enemyImage', canvas.toDataURL());
        }
        
        // تحديث المعاينات
        document.getElementById('playerPreview').src = localStorage.getItem('playerImage');
        document.getElementById('bgPreview').src = localStorage.getItem('bgImage');
        document.getElementById('enemyPreview').src = localStorage.getItem('enemyImage');
        
        // تحميل الصور في الكائنات العامة
        playerImgObj.src = localStorage.getItem('playerImage');
        bgImgObj.src = localStorage.getItem('bgImage');
        enemyImgObj.src = localStorage.getItem('enemyImage');
    })();

    const storage = {
        player: localStorage.getItem('playerImage'), 
        bg: localStorage.getItem('bgImage'),
        enemy: localStorage.getItem('enemyImage'),
        platforms: JSON.parse(localStorage.getItem('gamePlatforms') || "[]"),
        lastX: parseFloat(localStorage.getItem('playerLastX')) || 400,
        lastY: parseFloat(localStorage.getItem('playerLastY')) || 1400,
        kills: parseInt(localStorage.getItem('totalKills')) || 0,
        btnSize: localStorage.getItem('controlsSize') || 75
    };

    const playerImgObj = new Image(); 
    const bgImgObj = new Image(); 
    const enemyImgObj = new Image(); 

    function updateMenuDisplay() {
        document.getElementById('killCountDisplay').innerHTML = storage.kills > 0 ? "آخر نتيجة قتال: " + storage.kills : "اضغط الشاشة تبني اضغط المربع تهدم. ";
    }
    updateMenuDisplay();

    function applyBtnSize(size) {
        document.querySelectorAll('.control-btn').forEach(btn => {
            btn.style.width = size + 'px'; btn.style.height = size + 'px';
        });
    }
    applyBtnSize(storage.btnSize);

    const sizeVal = document.getElementById('sizeVal');
    slider.value = storage.btnSize; sizeVal.innerText = storage.btnSize;
    slider.oninput = function() {
        sizeVal.innerText = this.value; applyBtnSize(this.value);
        localStorage.setItem('controlsSize', this.value);
    }

        constructor(mode) {
            this.mode = mode;
            this.canvas = document.getElementById('gameCanvas');
            this.ctx = this.canvas.getContext('2d');
            this.LOGIC_WIDTH = 1280; this.LOGIC_HEIGHT = 720;
            this.x = storage.lastX; this.y = storage.lastY;
            this.playerHealth = 100; this.maxHealth = 100;
            this.enemies = []; this.enemySpawnTimer = 0;
            this.speed = 450; this.gravity = 1340; this.jumpForce = -650;
            this.velocityY = 0; this.moveDir = 0; this.facingRight = true;
            this.groundY = 1200; this.radius = 60; this.jumpCount = 0;
            this.zoom = 1.5; this.camX = this.x; this.camY = this.y;

            this.scale = Math.min(window.innerWidth / this.LOGIC_WIDTH, window.innerHeight / this.LOGIC_HEIGHT);

            this.canvas.height = this.LOGIC_HEIGHT * this.scale;
        }

            if (this.mode !== 'survival' || this.isDead) return;

            this.enemies.push({ x: this.x + (side * 500), y: this.y - 100, health: 50, maxHealth: 50, radius: 45, speed: 200 });

                this.currentFrame = 7;
                return;
            }
            if (this.isDashing) {
                this.currentFrame = 6;
                return;
            }
            if (Math.abs(this.velocityY) > 50 || this.jumpCount > 0) {
                this.currentFrame = 5;
                return;
            }

                this.animTimer += dt;
                if (this.animTimer >= this.animSpeed) {
                    this.animTimer = 0;
                    this.walkFrame = (this.walkFrame % 4) + 1;
                }
                this.currentFrame = this.walkFrame;
                return;
            }
            this.currentFrame = 0;
            this.walkFrame = 1;
            this.animTimer = 0;
        }

        bindControls() {
            const btn = (id, down, up) => {
                const el = document.getElementById(id);
                if(el) {
                    el.onpointerdown = (e) => { e.preventDefault(); if(!this.isDead) down(); };
                    if(up) el.onpointerup = (e) => { e.preventDefault(); up(); };
                }
            };
            btn('leftBtn', () => { this.moveDir = -1; this.facingRight = false; }, () => this.moveDir = 0);
            btn('rightBtn', () => { this.moveDir = 1; this.facingRight = true; }, () => this.moveDir = 0);
            btn('jumpBtn', () => { 
                if(this.jumpCount < 2 && !this.isDead) { 
                    this.velocityY = this.jumpForce; 
                    this.jumpCount++;

            });

            });
            btn('attackBtn', () => { 
                if (this.canAttack && !this.isDead) {
                    this.isAttacking = true; 
                    this.attackTime = 0.3; 
                    this.canAttack = false;

                    setTimeout(() => {

                }
            });

                const mx = (e.clientX - rect.left) / (this.scale * this.zoom) + this.camX - (this.LOGIC_WIDTH / (2 * this.zoom));

                const gx = Math.floor(mx/60)*60, gy = Math.floor(my/60)*60;
                const idx = this.platforms.findIndex(p => p.x === gx && p.y === gy);
                if (idx !== -1) this.platforms.splice(idx, 1);
                else this.platforms.push({x: gx, y: gy});
            };

            document.getElementById('exitBtn').onclick = () => { localStorage.setItem('playerLastX', this.x); localStorage.setItem('playerLastY', this.y); localStorage.setItem('gamePlatforms', JSON.stringify(this.platforms)); location.reload(); };
            document.getElementById('clearBtn').onclick = () => { localStorage.removeItem('gamePlatforms'); location.reload(); };
        }

            if (dt > 0.1) dt = 0.1; 
            if (this.isDead) return;
            
            let moveSpeed = this.isDashing ? 1200 : this.speed;

            let ny = this.y + this.velocityY * dt;
            
            if (this.isDashing) {
                this.velocityY = 0; 
            } else {
                this.velocityY += this.gravity * dt;
            }

            });

            if (this.isAttacking) { 
                this.attackTime -= dt; 
                if (this.attackTime <= 0) this.isAttacking = false; 
            }

            if (this.mode === 'survival') {
                this.enemySpawnTimer += dt;
                if (this.enemySpawnTimer > 4) { this.spawnEnemy(); this.enemySpawnTimer = 0; }
                this.enemies.forEach((en, idx) => {
                    const dx = this.x - en.x, dy = this.y - en.y, dist = Math.sqrt(dx*dx + dy*dy);
                    en.x += (dx/dist) * en.speed * dt; en.y += (dy/dist) * en.speed * dt;
                    if (dist < this.radius + en.radius) {

                        if(this.playerHealth <= 0) { this.isDead = true; setTimeout(() => location.reload(), 1000); }
                    }
                    if (this.isAttacking && dist < 170) { en.health -= 100 * dt; if(en.health <= 0) { this.enemies.splice(idx, 1); storage.kills++; localStorage.setItem('totalKills', storage.kills); } }
                });
            }
            
            this.camX += (this.x - this.camX) * 0.1; 
            this.camY += (this.y - this.camY) * 0.1;
        }

        drawPlayer() {
            if (this.isDead) return;
            
            this.ctx.save();
            this.ctx.translate(this.x, this.y);
            if(!this.facingRight) this.ctx.scale(-1, 1);
            
            if(storage.player && playerImgObj.complete && playerImgObj.naturalWidth > 0) {
                const frameW = playerImgObj.naturalWidth / 8;
                const frameH = playerImgObj.naturalHeight;
                const sx = this.currentFrame * frameW;
                const sy = 0;
                this.ctx.drawImage(playerImgObj, sx, sy, frameW, frameH, -75, -75, 150, 150);
            } else {
                this.ctx.fillStyle = "#f39c12"; 
                this.ctx.beginPath(); 
                this.ctx.arc(0, 0, 45, 0, Math.PI * 2); 
                this.ctx.fill();
                this.ctx.fillStyle = "white";
                this.ctx.font = "bold 20px Arial";
                this.ctx.fillText(this.currentFrame, -15, 10);
            }
            this.ctx.restore();
        }

        draw() {
            const s = this.scale * this.zoom;
            this.ctx.setTransform(s, 0, 0, s, 0, 0);
            this.ctx.clearRect(0, 0, this.LOGIC_WIDTH, this.LOGIC_HEIGHT);
            this.ctx.save();
            this.ctx.translate(-this.camX + (this.LOGIC_WIDTH / (2 * this.zoom)), -this.camY + (this.LOGIC_HEIGHT / (2 * this.zoom)));

            if(bgImgObj.complete && storage.bg) { 
                const drawW = 850, drawH = 1133;
                let startX = this.camX - (this.LOGIC_WIDTH / (2 * this.zoom));
                let startY = this.camY - (this.LOGIC_HEIGHT / (2 * this.zoom));
                for(let i = 0; i < 3; i++) {
                    this.ctx.drawImage(bgImgObj, 0, 0, bgImgObj.width, bgImgObj.height / 2, startX + (i * drawW) - drawW, startY + 0, drawW, drawH / 2);
                }
                const drawW2 = 3240, drawH2 = 4320;
                for(let i=-2000; i<6000; i+=(drawW2 - 1) ) this.ctx.drawImage(bgImgObj, 0, bgImgObj.height / 2, bgImgObj.width, bgImgObj.height / 2, i, -2600 + (drawH2 / 2), drawW2, drawH2 / 2);
            }

            this.ctx.fillStyle = "rgba(52, 152, 219, 0.6)";
            this.platforms.forEach(p => this.ctx.fillRect(p.x, p.y, 60, 60));

            this.enemies.forEach(en => {
                this.ctx.save();
                this.ctx.translate(en.x, en.y);
                if (this.x < en.x) this.ctx.scale(-1, 1);
                if(storage.enemy && enemyImgObj.complete) {
                    this.ctx.drawImage(enemyImgObj, -en.radius, -en.radius, en.radius * 2, en.radius * 2);
                } else {
                    this.ctx.fillStyle = "#e67e22"; this.ctx.beginPath(); this.ctx.arc(0, 0, en.radius, 0, Math.PI*2); this.ctx.fill();
                }
                this.ctx.restore();
                const barWidth = 60; this.ctx.fillStyle = "#222"; this.ctx.fillRect(en.x - barWidth/2, en.y - en.radius - 15, barWidth, 6);
                this.ctx.fillStyle = "#e74c3c"; this.ctx.fillRect(en.x - barWidth/2, en.y - en.radius - 15, (en.health / en.maxHealth) * barWidth, 6);
            });

            this.drawPlayer();

            if (this.isAttacking && !this.isDead) { 
                this.ctx.fillStyle = "rgba(231, 76, 60, 0.25)"; 
                this.ctx.beginPath(); 
                this.ctx.arc(this.x, this.y, 170, 0, Math.PI*2); 
                this.ctx.fill(); 
            }
            
            this.ctx.restore();
        }

        loop(timestamp) {
            if (!this.lastTimestamp) this.lastTimestamp = timestamp;
            const dt = (timestamp - this.lastTimestamp) / 1000;
            this.lastTimestamp = timestamp; 
            this.update(dt); 
            this.draw();
            requestAnimationFrame((t) => this.loop(t));
        }
    }

            canvas.width = 800; canvas.height = 100;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#f39c12';
            ctx.fillRect(0, 0, 800, 100);
            ctx.fillStyle = 'white';
            ctx.font = 'bold 20px Arial';
            ctx.fillText('PLAYER (8 Frames)', 300, 60);
            localStorage.setItem('playerImage', canvas.toDataURL());
        }
        
        if (!localStorage.getItem('bgImage')) {
            const canvas = document.createElement('canvas');
            canvas.width = 1920; canvas.height = 1080;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#1a472a';
            ctx.fillRect(0, 0, 1920, 1080);
            ctx.fillStyle = '#2d6a4f';
            for(let i=0; i<200; i++) ctx.fillRect(Math.random()*1920, Math.random()*1080, 20, 20);
            localStorage.setItem('bgImage', canvas.toDataURL());
        }
        
        if (!localStorage.getItem('enemyImage')) {
            const canvas = document.createElement('canvas');
            canvas.width = 100; canvas.height = 100;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#e74c3c';
            ctx.beginPath();
            ctx.arc(50, 50, 40, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = 'white';
            ctx.font = 'bold 16px Arial';
            ctx.fillText('ENEMY', 20, 55);
            localStorage.setItem('enemyImage', canvas.toDataURL());
        }
        
        // تحديث المعاينات
        document.getElementById('playerPreview').src = localStorage.getItem('playerImage');
        document.getElementById('bgPreview').src = localStorage.getItem('bgImage');
        document.getElementById('enemyPreview').src = localStorage.getItem('enemyImage');
        
        // تحميل الصور في الكائنات العامة
        playerImgObj.src = localStorage.getItem('playerImage');
        bgImgObj.src = localStorage.getItem('bgImage');
        enemyImgObj.src = localStorage.getItem('enemyImage');
    })();

    const storage = {
        player: localStorage.getItem('playerImage'), 
        bg: localStorage.getItem('bgImage'),
        enemy: localStorage.getItem('enemyImage'),
        platforms: JSON.parse(localStorage.getItem('gamePlatforms') || "[]"),
        lastX: parseFloat(localStorage.getItem('playerLastX')) || 400,
        lastY: parseFloat(localStorage.getItem('playerLastY')) || 1400,
        kills: parseInt(localStorage.getItem('totalKills')) || 0,
        btnSize: localStorage.getItem('controlsSize') || 75
    };

    const playerImgObj = new Image(); 
    const bgImgObj = new Image(); 
    const enemyImgObj = new Image(); 

    function updateMenuDisplay() {
        document.getElementById('killCountDisplay').innerHTML = storage.kills > 0 ? "آخر نتيجة قتال: " + storage.kills : "اضغط الشاشة تبني اضغط المربع تهدم. ";
    }
    updateMenuDisplay();

    function applyBtnSize(size) {
        document.querySelectorAll('.control-btn').forEach(btn => {
            btn.style.width = size + 'px'; btn.style.height = size + 'px';
        });
    }
    applyBtnSize(storage.btnSize);

    const slider = document.getElementById('btnSizeSlider');
    const sizeVal = document.getElementById('sizeVal');
    slider.value = storage.btnSize; sizeVal.innerText = storage.btnSize;
    slider.oninput = function() {
        sizeVal.innerText = this.value; applyBtnSize(this.value);
        localStorage.setItem('controlsSize', this.value);
    }

    class GameCore {
        constructor(mode) {
            this.mode = mode;
            this.canvas = document.getElementById('gameCanvas');
            this.ctx = this.canvas.getContext('2d');
            this.LOGIC_WIDTH = 1280; this.LOGIC_HEIGHT = 720;
            this.x = storage.lastX; this.y = storage.lastY;
            this.playerHealth = 100; this.maxHealth = 100;
            this.enemies = []; this.enemySpawnTimer = 0;
            this.speed = 450; this.gravity = 1340; this.jumpForce = -650;
            this.velocityY = 0; this.moveDir = 0; this.facingRight = true;
            this.groundY = 1200; this.radius = 60; this.jumpCount = 0;
            this.zoom = 1.5; this.camX = this.x; this.camY = this.y;
            this.isDashing = false; this.canDash = true;
            this.isAttacking = false; this.attackTime = 0;
            this.canAttack = true; 
            this.platforms = storage.platforms;
            this.isDead = false; this.lastTimestamp = 0;
            
            // نظام الإطارات المتحركة
            this.currentFrame = 0;
            this.animTimer = 0;
            this.animSpeed = 0.12;
            this.walkFrame = 1;
            this.lastWasMoving = false;
            
            this.init();
        }

        init() {
            document.getElementById('mainMenu').style.display = 'none';
            document.getElementById('gameCanvas').style.display = 'block';
            document.getElementById('uiLayer').style.display = 'block';
            if(this.mode === 'survival') document.getElementById('healthBarContainer').style.display = 'block';
            window.addEventListener('resize', () => this.resize());
            this.resize(); this.bindControls();
            requestAnimationFrame((t) => this.loop(t));
        }

        resize() {
            this.scale = Math.min(window.innerWidth / this.LOGIC_WIDTH, window.innerHeight / this.LOGIC_HEIGHT);
            this.canvas.width = this.LOGIC_WIDTH * this.scale;
            this.canvas.height = this.LOGIC_HEIGHT * this.scale;
        }

        spawnEnemy() {
            if (this.mode !== 'survival' || this.isDead) return;
            const side = Math.random() > 0.5 ? 1 : -1;
            this.enemies.push({ x: this.x + (side * 500), y: this.y - 100, health: 50, maxHealth: 50, radius: 45, speed: 200 });
        }

        updateAnimation(dt, isMoving) {
            if (this.isAttacking) {
                this.currentFrame = 7;
                return;
            }
            if (this.isDashing) {
                this.currentFrame = 6;
                return;
            }
            if (Math.abs(this.velocityY) > 50 || this.jumpCount > 0) {
                this.currentFrame = 5;
                return;
            }
            if (isMoving && this.moveDir !== 0) {
                this.animTimer += dt;
                if (this.animTimer >= this.animSpeed) {
                    this.animTimer = 0;
                    this.walkFrame = (this.walkFrame % 4) + 1;
                }
                this.currentFrame = this.walkFrame;
                return;
            }
            this.currentFrame = 0;
            this.walkFrame = 1;
            this.animTimer = 0;
        }

        bindControls() {
            const btn = (id, down, up) => {
                const el = document.getElementById(id);
                if(el) {
                    el.onpointerdown = (e) => { e.preventDefault(); if(!this.isDead) down(); };
                    if(up) el.onpointerup = (e) => { e.preventDefault(); up(); };
                }
            };
            btn('leftBtn', () => { this.moveDir = -1; this.facingRight = false; }, () => this.moveDir = 0);
            btn('rightBtn', () => { this.moveDir = 1; this.facingRight = true; }, () => this.moveDir = 0);
            btn('jumpBtn', () => { 
                if(this.jumpCount < 2 && !this.isDead) { 
                    this.velocityY = this.jumpForce; 
                    this.jumpCount++; 
                } 
            });
            btn('dashBtn', () => { 
                if (this.canDash && !this.isDead) { 
                    this.isDashing = true; 
                    this.canDash = false; 
                    setTimeout(() => this.isDashing = false, 200); 
                    setTimeout(() => this.canDash = true, 760); 
                } 
            });
            btn('attackBtn', () => { 
                if (this.canAttack && !this.isDead) {
                    this.isAttacking = true; 
                    this.attackTime = 0.3; 
                    this.canAttack = false;
                    document.getElementById('attackBtn').style.opacity = "0.3"; 
                    setTimeout(() => { 
                        this.canAttack = true; 
                        document.getElementById('attackBtn').style.opacity = "1"; 
                    }, 600); 
                }
            });

            this.canvas.onpointerdown = (e) => {
                if(this.isDead) return;
                const rect = this.canvas.getBoundingClientRect();
                const mx = (e.clientX - rect.left) / (this.scale * this.zoom) + this.camX - (this.LOGIC_WIDTH / (2 * this.zoom));
                const my = (e.clientY - rect.top) / (this.scale * this.zoom) + this.camY - (this.LOGIC_HEIGHT / (2 * this.zoom));
                const gx = Math.floor(mx/60)*60, gy = Math.floor(my/60)*60;
                const idx = this.platforms.findIndex(p => p.x === gx && p.y === gy);
                if (idx !== -1) this.platforms.splice(idx, 1);
                else this.platforms.push({x: gx, y: gy});
            };

            document.getElementById('exitBtn').onclick = () => { localStorage.setItem('playerLastX', this.x); localStorage.setItem('playerLastY', this.y); localStorage.setItem('gamePlatforms', JSON.stringify(this.platforms)); location.reload(); };
            document.getElementById('clearBtn').onclick = () => { localStorage.removeItem('gamePlatforms'); location.reload(); };
        }

        update(dt) {
            if (dt > 0.1) dt = 0.1; 
            if (this.isDead) return;
            
            let moveSpeed = this.isDashing ? 1200 : this.speed;
            let effectiveDir = this.isDashing ? (this.facingRight ? 1 : -1) : this.moveDir;
            let nx = this.x + (effectiveDir * moveSpeed) * dt;
            let ny = this.y + this.velocityY * dt;
            
            if (this.isDashing) {
                this.velocityY = 0; 
            } else {
                this.velocityY += this.gravity * dt;
            }

            this.platforms.forEach(p => {
                const pL = p.x, pR = p.x + 60, pT = p.y, pB = p.y + 60;
                if (nx + 45 > pL && nx - 45 < pR && ny + 45 > pT && ny - 45 < pB) {
                    const oL = (nx + 45) - pL, oR = pR - (nx - 45), oT = (ny + 45) - pT, oB = pB - (ny - 45);
                    const min = Math.min(oL, oR, oT, oB);
                    if (min === oT && this.velocityY > 0) { ny = pT - 45; this.velocityY = 0; this.jumpCount = 0; }
                    else if (min === oB && this.velocityY < 0) { ny = pB + 45; this.velocityY = 0; }
                    else if (min === oL) nx = pL - 45;
                    else if (min === oR) nx = pR + 45;
                }
            });

            this.x = nx; this.y = ny;
            if (this.x < -1550) this.x = -1550;
            if (this.x > 5500) this.x = 5500;
            if (this.y >= this.groundY) { this.y = this.groundY; this.velocityY = 0; this.jumpCount = 0; }

            const isMoving = this.moveDir !== 0 && !this.isDashing && !this.isAttacking;
            this.updateAnimation(dt, isMoving);
            
            if (this.isAttacking) { 
                this.attackTime -= dt; 
                if (this.attackTime <= 0) this.isAttacking = false; 
            }

            if (this.mode === 'survival') {
                this.enemySpawnTimer += dt;
                if (this.enemySpawnTimer > 4) { this.spawnEnemy(); this.enemySpawnTimer = 0; }
                this.enemies.forEach((en, idx) => {
                    const dx = this.x - en.x, dy = this.y - en.y, dist = Math.sqrt(dx*dx + dy*dy);
                    en.x += (dx/dist) * en.speed * dt; en.y += (dy/dist) * en.speed * dt;
                    if (dist < this.radius + en.radius) {
                        this.playerHealth -= 20 * dt;
                        document.getElementById('healthBar').style.width = (this.playerHealth/this.maxHealth)*100 + "%";
                        if(this.playerHealth <= 0) { this.isDead = true; setTimeout(() => location.reload(), 1000); }
                    }
                    if (this.isAttacking && dist < 170) { en.health -= 100 * dt; if(en.health <= 0) { this.enemies.splice(idx, 1); storage.kills++; localStorage.setItem('totalKills', storage.kills); } }
                });
            }
            
            this.camX += (this.x - this.camX) * 0.1; 
            this.camY += (this.y - this.camY) * 0.1;
        }

        drawPlayer() {
            if (this.isDead) return;
            
            this.ctx.save();
            this.ctx.translate(this.x, this.y);
            if(!this.facingRight) this.ctx.scale(-1, 1);
            
            if(storage.player && playerImgObj.complete && playerImgObj.naturalWidth > 0) {
                const frameW = playerImgObj.naturalWidth / 8;
                const frameH = playerImgObj.naturalHeight;
                const sx = this.currentFrame * frameW;
                const sy = 0;
                this.ctx.drawImage(playerImgObj, sx, sy, frameW, frameH, -75, -75, 150, 150);
            } else {
                this.ctx.fillStyle = "#f39c12"; 
                this.ctx.beginPath(); 
                this.ctx.arc(0, 0, 45, 0, Math.PI * 2); 
                this.ctx.fill();
                this.ctx.fillStyle = "white";
                this.ctx.font = "bold 20px Arial";
                this.ctx.fillText(this.currentFrame, -15, 10);
            }
            this.ctx.restore();
        }

        draw() {
            const s = this.scale * this.zoom;
            this.ctx.setTransform(s, 0, 0, s, 0, 0);
            this.ctx.clearRect(0, 0, this.LOGIC_WIDTH, this.LOGIC_HEIGHT);
            this.ctx.save();
            this.ctx.translate(-this.camX + (this.LOGIC_WIDTH / (2 * this.zoom)), -this.camY + (this.LOGIC_HEIGHT / (2 * this.zoom)));

            if(bgImgObj.complete && storage.bg) { 
                const drawW = 850, drawH = 1133;
                let startX = this.camX - (this.LOGIC_WIDTH / (2 * this.zoom));
                let startY = this.camY - (this.LOGIC_HEIGHT / (2 * this.zoom));
                for(let i = 0; i < 3; i++) {
                    this.ctx.drawImage(bgImgObj, 0, 0, bgImgObj.width, bgImgObj.height / 2, startX + (i * drawW) - drawW, startY + 0, drawW, drawH / 2);
                }
                const drawW2 = 3240, drawH2 = 4320;
                for(let i=-2000; i<6000; i+=(drawW2 - 1) ) this.ctx.drawImage(bgImgObj, 0, bgImgObj.height / 2, bgImgObj.width, bgImgObj.height / 2, i, -2600 + (drawH2 / 2), drawW2, drawH2 / 2);
            }

            this.ctx.fillStyle = "rgba(52, 152, 219, 0.6)";
            this.platforms.forEach(p => this.ctx.fillRect(p.x, p.y, 60, 60));

            this.enemies.forEach(en => {
                this.ctx.save();
                this.ctx.translate(en.x, en.y);
                if (this.x < en.x) this.ctx.scale(-1, 1);
                if(storage.enemy && enemyImgObj.complete) {
                    this.ctx.drawImage(enemyImgObj, -en.radius, -en.radius, en.radius * 2, en.radius * 2);
                } else {
                    this.ctx.fillStyle = "#e67e22"; this.ctx.beginPath(); this.ctx.arc(0, 0, en.radius, 0, Math.PI*2); this.ctx.fill();
                }
                this.ctx.restore();
                const barWidth = 60; this.ctx.fillStyle = "#222"; this.ctx.fillRect(en.x - barWidth/2, en.y - en.radius - 15, barWidth, 6);
                this.ctx.fillStyle = "#e74c3c"; this.ctx.fillRect(en.x - barWidth/2, en.y - en.radius - 15, (en.health / en.maxHealth) * barWidth, 6);
            });

            this.drawPlayer();

            if (this.isAttacking && !this.isDead) { 
                this.ctx.fillStyle = "rgba(231, 76, 60, 0.25)"; 
                this.ctx.beginPath(); 
                this.ctx.arc(this.x, this.y, 170, 0, Math.PI*2); 
                this.ctx.fill(); 
            }
            
            this.ctx.restore();
        }

        loop(timestamp) {
            if (!this.lastTimestamp) this.lastTimestamp = timestamp;
            const dt = (timestamp - this.lastTimestamp) / 1000;
            this.lastTimestamp = timestamp; 
            this.update(dt); 
            this.draw();
            requestAnimationFrame((t) => this.loop(t));
        }
    }

    document.getElementById('survivalBtn').onclick = () => {
        storage.kills = 0; localStorage.setItem('totalKills', 0); 
        updateMenuDisplay();
        new GameCore('survival');
    };
    document.getElementById('creativeBtn').onclick = () => new GameCore('creative');
    document.getElementById('openCustomizer').onclick = () => document.getElementById('customizerOverlay').style.display = 'flex';
    document.getElementById('closeCustomizer').onclick = () => document.getElementById('customizerOverlay').style.display = 'none';

    function setupLoader(id, prev, key, imgObj) {
        document.getElementById(id).onchange = (e) => {
            const file = e.target.files[0]; if (!file) return;
            const reader = new FileReader();
            const pCont = document.getElementById('progCont'); const pBar = document.getElementById('progBar');
            reader.onloadstart = () => { pCont.style.display = 'block'; pBar.style.width = '0%'; };
            reader.onprogress = (ev) => { if (ev.lengthComputable) pBar.style.width = (ev.loaded / ev.total) * 100 + '%'; };
            reader.onload = (ev) => {
                try {
                    localStorage.setItem(key, ev.target.result);
                    document.getElementById(prev).src = ev.target.result;
                    imgObj.src = ev.target.result;
                    pBar.style.width = '100%'; 
                    setTimeout(() => { pCont.style.display = 'none'; }, 600);
                    
                    const tempImg = new Image();
                    tempImg.onload = () => {
                        const frameW = tempImg.width / 8;
                        console.log(`✅ تم تحميل الصورة: ${tempImg.width}x${tempImg.height} | عرض كل إطار: ${frameW}px`);
                        alert(`✅ تم تحميل الصورة بنجاح!\n📐 الأبعاد: ${tempImg.width}×${tempImg.height}\n🎬 تم تقسيمها إلى 8 إطارات`);
                    };
                    tempImg.src = ev.target.result;
                } catch (e) { alert("المساحة ممتلئة!"); pCont.style.display = 'none'; }
            };
            reader.readAsDataURL(file);
        };
    }

    setupLoader('playerLoader', 'playerPreview', 'playerImage', playerImgObj);
    setupLoader('bgLoader', 'bgPreview', 'bgImage', bgImgObj);
    setupLoader('enemyLoader', 'enemyPreview', 'enemyImage', enemyImgObj);
</script>
