<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<link rel="icon" type="image/png" href="favicon_b.png">
<link rel="apple-touch-icon" href="favicon_b.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قائمة الملفات - دعم الروابط</title>
    <style>
    
    /* نافذة تشغيل الفيديو */
.modal-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.9); backdrop-filter: blur(8px); z-index: 1000;
    display: flex; align-items: center; justify-content: center;
    visibility: hidden; opacity: 0; transition: 0.2s;
}
.modal-overlay.active { visibility: visible; opacity: 1; }
.video-modal {
    background: #0a0a14; border-radius: 28px; width: 90%; max-width: 1000px;
    border: 1px solid #2a2a5a; overflow: hidden;
}
.modal-header {
    display: flex; justify-content: space-between; padding: 18px 24px;
    background: #12121e; border-bottom: 1px solid #2a2a4a;
}
.close-modal {
    background: #ff4444aa; border: none; color: white; font-size: 1.6rem;
    width: 36px; height: 36px; border-radius: 50%; cursor: pointer;
}
.video-container { padding: 20px; background: #000; }
video { width: 100%; border-radius: 16px; }
.video-info { padding: 16px 24px; background: #12121e; }
.btn-group { display: flex; gap: 10px; }
.watch-btn {
    background: linear-gradient(135deg, #7c4dff, #5e35b1); color: white;
    padding: 10px 18px; border-radius: 8px; font-weight: bold; cursor: pointer;
}
    
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
            background: #0f0f1a;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }

        .container {
            width: 100%;
            max-width: 700px;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 1.8rem;
            color: #00d4ff;
            text-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
        }

        #status {
            text-align: center;
            margin-bottom: 20px;
            padding: 12px;
            border-radius: 10px;
            font-size: 0.95rem;
        }

        #status.loading {
            background: rgba(255, 193, 7, 0.15);
            border: 1px solid #ffc107;
            color: #ffc107;
        }
        #status.success {
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid #00d4ff;
            color: #00d4ff;
        }

        #status.error {
            background: rgba(255, 68, 68, 0.15);
            border: 1px solid #ff4444;
            color: #ff4444;
        }

        .file-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .file-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border: 1px solid #2a2a4a;
            border-radius: 12px;
            padding: 16px 20px;
            transition: all 0.3s ease;
        }

        .file-item:hover {
            border-color: #00d4ff;
            box-shadow: 0 4px 20px rgba(0, 212, 255, 0.15);
            transform: translateY(-2px);
        }

        .file-info {
            display: flex;
            align-items: center;
            gap: 14px;
            flex: 1;
            min-width: 0;
        }

        .file-icon {
            font-size: 1.8rem;
            flex-shrink: 0;
        }

        .file-name {            font-size: 1.05rem;
            font-weight: 500;
            color: #ffffff;
            word-break: break-word;
        }

        .download-btn {
            flex-shrink: 0;
            background: linear-gradient(135deg, #00d4ff, #0099cc);
            color: #000;
            border: none;
            padding: 10px 22px;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 6px;
            text-decoration: none;
        }

        .download-btn:hover {
            background: linear-gradient(135deg, #33e0ff, #00b8e6);
            box-shadow: 0 4px 15px rgba(0, 212, 255, 0.4);
            transform: scale(1.05);
        }

        .download-btn:active {
            transform: scale(0.98);
        }
        
        /* زر الرابط الجديد */
        .link-btn {
            flex-shrink: 0;
            background: linear-gradient(135deg, #ff9800, #f57c00);
            color: #000;
            border: none;
            padding: 10px 22px;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            text-decoration: none;
        }
        
        .link-btn:hover {
            background: linear-gradient(135deg, #ffb74d, #ff9800);
            box-shadow: 0 4px 15px rgba(255, 152, 0, 0.4);
            transform: scale(1.05);
        }
        
        .button-group {
            display: flex;
            gap: 10px;
            flex-shrink: 0;
        }

        .file-count {
            text-align: center;
            margin-top: 20px;
            color: #888;
            font-size: 0.9rem;
        }
        
        /* تنسيق الرابط كنص داخل العنصر */
        .url-preview {
            font-size: 0.75rem;
            color: #ff9800;
            margin-top: 4px;
            word-break: break-all;
            font-family: monospace;
        }
        

/* تنسيق الصورة للرابط - تتكيف مع قياساتها الأصلية */
.link-large-image {
    width: 100%;
    height: auto;
    max-height: 400px;
    object-fit: contain;
    border-radius: 12px;
    margin-top: 12px;
    cursor: pointer;
    transition: transform 0.3s ease;
    border: 1px solid #2a2a4a;
    background: #0a0a14;
}
        
        .link-large-image:hover {
            transform: scale(1.02);
            border-color: #ff9800;
        }
        
        .link-content {
            display: flex;
            flex-direction: column;
            flex: 1;
            gap: 10px;
        }
        
        .link-header {
            display: flex;
            align-items: center;
            gap: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>هذه اللعبة فريدة في عالم الالعاب لكنها محدودة جدا. اذا اعجبتك اللعبة وتريد تطويرها فلك كامل الحرية. اللعبة متاحة للمجتمع وانت سوف يكون لك دور كبير في اسعاد مجتمع لاعبي  indie. فلو كنت شغوفا حمل كل ما يلزم من هذا المستودع وانطلق ⚔️ </h1>

        <div id="status" class="loading">جاري تحميل البيانات...</div>

        <ul id="fileList" class="file-list"></ul>

        <div id="fileCount" class="file-count"></div>
    </div>

    <script>
        const DATA_FILE = 'data_P.txt';

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        function isImageFile(filename) {
            const imageExts = ['png', 'jpg', 'jpeg', 'gif', 'svg', 'webp', 'bmp'];
            return imageExts.includes(filename.split('.').pop().toLowerCase());
        }

        function isHttpsLink(filename) {
            if (filename.startsWith('https://') || filename.startsWith('http://')) return true;
            const ext = filename.split('.').pop().toLowerCase();
            if (ext === 'https') return true;
            return false;
        }

        function extractUrl(filename) {
            let url = filename;
            if (url.toLowerCase().endsWith('.https')) {
                url = url.slice(0, -6);
            }
            return url;
        }

        function getFileIcon(filename) {
            if (isHttpsLink(filename)) return '🔗';
            
            const ext = filename.split('.').pop().toLowerCase();
            const icons = {
                zip: '📦', rar: '📦', '7z': '📦', tar: '📦', gz: '📦',
                exe: '⚙️', msi: '⚙️', apk: '📱',
                png: '🖼️', jpg: '🖼️', jpeg: '🖼️', gif: '🖼️', svg: '🖼️',
                pdf: '📄', doc: '📄', docx: '📄', txt: '📄',
                mp4: '🎬', mkv: '🎬', avi: '🎬', mp3: '🎵', wav: '🎵',
                js: '💻', html: '💻', css: '💻', py: '💻',
            };
            return icons[ext] || '📎';
        }

        function isVideoFile(filename) {
            const videoExts = ['mp4', 'mkv', 'avi', 'mov', 'wmv', 'flv', 'webm', 'm4v'];
            return videoExts.includes(filename.split('.').pop().toLowerCase());
        }

        // دالة parseData المعدلة لدعم صيغة الرابط&&الصورة
        function parseData(text) {
            const lines = text.split('\n');
            const files = [];
            
            for (let i = 0; i < lines.length; i++) {
                let line = lines[i].trim();
                if (line === '') continue;
                
                const descMatch = line.match(/"([^"]+)"/);
                if (descMatch) {
                    const description = descMatch[1];
                    if (i + 1 < lines.length) {
                        let content = lines[i + 1].trim();
                        i++;
                        
                        if (content.includes('&&')) {
                            const parts = content.split('&&');
                            const linkUrl = parts[0].trim();
                            const thumbnail = parts[1].trim();
                            
                            files.push({
                                description: description,
                                filename: linkUrl,
                                thumbnail: thumbnail,
                                isLinkWithImage: true
                            });
                        } else {
                            files.push({
                                description: description,
                                filename: content,
                                thumbnail: null,
                                isLinkWithImage: false
                            });
                        }
                    }
                }
            }
            return files;
        }

        function displayFiles(files) {
            const list = document.getElementById('fileList');
            const countDiv = document.getElementById('fileCount');
            list.innerHTML = '';

            if (files.length === 0) {
                list.innerHTML = '<li style="text-align:center;color:#888;padding:30px;">لا توجد ملفات في القائمة</li>';
                countDiv.textContent = 'عدد الملفات: 0';
                return;
            }

            files.forEach((file) => {
                const isLink = isHttpsLink(file.filename);
                const actualUrl = extractUrl(file.filename);
                
                // حالة خاصة: رابط مع صورة مصغرة - الصورة تأخذ مكان النص
                if (file.isLinkWithImage && file.thumbnail) {
                    const li = document.createElement('li');
                    li.className = 'file-item';
                    li.style.flexDirection = 'column';
                    li.style.alignItems = 'stretch';
                    
                    // الصورة الكبيرة التي تملأ المساحة (بدلاً من نص الرابط)
                    const img = document.createElement('img');
                    img.src = file.thumbnail;
                    img.alt = escapeHtml(file.description);
                    img.className = 'link-large-image';
                    img.onerror = () => {
                        img.style.display = 'none';
                        // إذا فشلت الصورة، نعرض نص الرابط كبديل
                        const fallback = document.createElement('div');
                        fallback.className = 'url-preview';
                        fallback.style.padding = '20px';
                        fallback.style.textAlign = 'center';
                        fallback.innerHTML = `🔗 ${escapeHtml(actualUrl)}`;
                        li.insertBefore(fallback, buttonDiv);
                    };
                    
                    // عند النقر على الصورة يفتح الرابط
                    img.onclick = () => {
                        window.open(actualUrl, '_blank');
                    };
                    
                    // العنوان في الأعلى
                    const headerDiv = document.createElement('div');
                    headerDiv.style.display = 'flex';
                    headerDiv.style.alignItems = 'center';
                    headerDiv.style.gap = '12px';
                    headerDiv.style.marginBottom = '12px';
                    headerDiv.innerHTML = `
                        <span class="file-icon" style="font-size: 1.5rem;">🔗</span>
                        <div style="flex:1;">
                            <div class="file-name" style="font-weight:500;">${escapeHtml(file.description)}</div>
                        </div>
                    `;
                    
                    li.appendChild(headerDiv);
                    li.appendChild(img);
                    
                    // زر فتح الرابط
                    const buttonDiv = document.createElement('div');
                    buttonDiv.style.marginTop = '12px';
                    buttonDiv.innerHTML = `
                        <a class="link-btn" href="${actualUrl}" target="_blank" rel="noopener noreferrer" style="display: inline-flex; width: auto;">🔗 الدخول</a>
                    `;
                    li.appendChild(buttonDiv);
                    
                    list.appendChild(li);
                }
                // باقي الملفات (فيديو، صورة، zip، الخ) - كما هي دون تغيير
                else {
                    const icon = getFileIcon(file.filename);
                    const isVideo = !isLink && isVideoFile(file.filename);
                    const isImage = !isLink && isImageFile(file.filename);
                    
                    const li = document.createElement('li');
                    li.className = 'file-item';
                    li.style.flexDirection = 'column';
                    li.style.alignItems = 'stretch';
                    li.style.padding = '0';
                    li.style.overflow = 'hidden';

                    const headerDiv = document.createElement('div');
                    headerDiv.style.display = 'flex';
                    headerDiv.style.alignItems = 'center';
                    headerDiv.style.gap = '12px';
                    headerDiv.style.padding = '16px 20px 0 20px';
                    headerDiv.style.paddingBottom = (isVideo || isImage) ? '12px' : '16px';
                    headerDiv.innerHTML = `
                        <span class="file-icon" style="font-size: 1.5rem;">${icon}</span>
                        <div style="flex:1;">
                            <div class="file-name" style="font-weight:500;">${escapeHtml(file.description)}</div>
                            ${isLink ? `<div class="url-preview">🔗 ${escapeHtml(actualUrl)}</div>` : ''}
                        </div>
                    `;
                    li.appendChild(headerDiv);

                    if (!isLink && isVideo) {
                        const videoContainer = document.createElement('div');
                        videoContainer.style.width = '100%';
                        videoContainer.style.backgroundColor = '#000';
                        videoContainer.style.aspectRatio = '16 / 9';
                        videoContainer.innerHTML = `
                            <video controls preload="metadata" style="width: 100%; height: 100%; object-fit: contain;">
                                <source src="${file.filename}">
                                متصفحك لا يدعم الفيديو
                            </video>
                        `;
                        li.appendChild(videoContainer);
                    } 
                    else if (!isLink && isImage) {
                        const imgContainer = document.createElement('div');
                        imgContainer.style.width = '100%';
                        imgContainer.style.backgroundColor = '#0a0a14';
                        imgContainer.style.display = 'flex';
                        imgContainer.style.justifyContent = 'center';
                        imgContainer.style.alignItems = 'center';
                        imgContainer.style.minHeight = '200px';
                        imgContainer.innerHTML = `
                            <img src="${file.filename}" alt="${escapeHtml(file.description)}" style="max-width: 100%; max-height: 350px; object-fit: contain; display: block;">
                        `;
                        li.appendChild(imgContainer);
                    }

                    const buttonDiv = document.createElement('div');
                    buttonDiv.style.padding = '16px 20px';
                    buttonDiv.style.borderTop = (isVideo || isImage) ? '1px solid #2a2a4a' : 'none';
                    buttonDiv.style.marginTop = (isVideo || isImage) ? '0' : '0';
                    
                    if (isLink && !file.isLinkWithImage) {
                        buttonDiv.innerHTML = `
                            <a class="link-btn" href="${actualUrl}" target="_blank" rel="noopener noreferrer" style="display: inline-flex; width: auto;">🔗 فتح الرابط</a>
                        `;
                    } else {
                        buttonDiv.innerHTML = `
                            <a class="download-btn" href="${file.filename}" download style="display: inline-flex; width: auto;">⬇ تحميل الملف</a>
                        `;
                    }
                    li.appendChild(buttonDiv);
                    
                    list.appendChild(li);
                }
            });

            countDiv.textContent = `عدد العناصر: ${files.length}`;
        }

        async function loadData() {
            const statusEl = document.getElementById('status');

            try {
                const response = await fetch(DATA_FILE);
                if (!response.ok) {
                    throw new Error(`لم يتم العثور على الملف: ${DATA_FILE}`);
                }

                const text = await response.text();
                const files = parseData(text);
                displayFiles(files);

                statusEl.className = 'success';
                statusEl.textContent = '✅ تم تحميل البيانات بنجاح';

            } catch (err) {
                statusEl.className = 'error';
                statusEl.textContent = '❌ خطأ: ' + err.message;
                console.error(err);
            }
        }

        loadData();
    </script>
    
    <div id="videoModal" class="modal-overlay">
        <div class="video-modal">
            <div class="modal-header">
                <h3>🎬 <span id="modalFileTitle">مشغل الفيديو</span></h3>
                <button class="close-modal" id="closeModalBtn">✕</button>
            </div>
            <div class="video-container">
                <video id="videoPlayer" controls>
                    <source id="videoSource" src="">
                </video>
            </div>
            <div class="video-info">
                <div class="video-title" id="videoInfoTitle"></div>
                <a href="#" id="modalDownloadLink" download style="display:inline-block; margin-top:12px; background:#00d4ff; padding:8px 16px; border-radius:40px; color:#000; text-decoration:none;">⬇ تحميل الفيديو</a>
            </div>
        </div>
    </div>
</body>
</html>
