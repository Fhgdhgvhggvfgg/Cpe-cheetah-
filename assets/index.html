<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>معرض صور الشخصيات والساحات</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
    font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
    background: url('../game_power/menu.png') no-repeat center center;
    background-size: cover;
    background-attachment: fixed;
    min-height: 100vh;
    padding: 20px;
}
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: url('../game_power/player_f.png') no-repeat center center; background-size: 1000px 1000px; padding: 10px 15px; font-size: 13px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
            overflow: hidden;
        }
        .header {
            background: url('../game_power/button.png') no-repeat center center; background-size: 470px 140px; padding: 10px 15px; font-size: 13px;
            color: #fff;
            padding: 20px;
            text-align: center;
        }
        .header h1 { font-size: 22px; margin-bottom: 5px; }
        .header p { font-size: 14px; opacity: 0.9; }
        
        .search-box { padding: 15px; background: url('../game_power/button.png') no-repeat center center; background-size: 460px 80px; padding: 10px 15px; font-size: 13px; border-bottom: 2px solid #e9ecef; }
        .search-box input {
            width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 10px;
            font-size: 15px; outline: none;
        }
        .search-box input:focus { border-color: #007bff; }
        
        .search-result {
            padding: 15px; background: url('../game_power/button.png') no-repeat center center; background-size: 500px 40px; padding: 10px 15px; font-size: 13px; border-bottom: 2px solid #e9ecef;
            display: none; text-align: center;
        }
        .search-result.show { display: block; }
        .search-result img { width: 100%; border-radius: 10px; margin-bottom: 10px; }
        
        /* شريط المجموعات الأفقي */
        .category-bar {
            padding: 15px;
            background: url('../game_power/button.png') no-repeat center center; background-size: 460px 40px; padding: 10px 15px; font-size: 13px;
            border-bottom: 2px solid #e9ecef;            display: flex;
            gap: 10px;
            overflow-x: auto;
            flex-wrap: wrap;
        }
        .category-bar::-webkit-scrollbar { height: 6px; }
        .category-bar::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 3px; }
        .category-bar::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }
        
        .category-btn {
            padding: 10px 20px;
            background: url('../game_power/player_f.png') no-repeat center center; background-size: 500px 200px; padding: 10px 15px; font-size: 13px;
            color: #495057;
            border: 2px solid #dee2e6;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            white-space: nowrap;
            transition: all 0.3s;
        }
        .category-btn:hover {
            background: #dee2e6;
            transform: translateY(-2px);
        }
        .category-btn.active {
            background: #007bff;
            color: #fff;
            border-color: #007bff;
        }
        .category-btn .count {
            background: url('../game_power/button.png') no-repeat center center; background-size: 500px 40px; padding: 10px 15px; font-size: 13px;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 12px;
            margin-right: 5px;
        }
        
        .gallery {
            max-height: 600px; overflow-y: auto; padding: 15px;
        }
        .gallery::-webkit-scrollbar { width: 8px; }
        .gallery::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        .gallery::-webkit-scrollbar-thumb { background: #ccc; border-radius: 4px; }
        .gallery::-webkit-scrollbar-thumb:hover { background: #aaa; }
        
        .image-card {
            background: url('../game_power/player_f.png') no-repeat center center; background-size: 1000px 1000px; 
            margin-bottom: 15px; overflow: hidden;
            animation: fadeIn 0.3s ease;        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .image-container {
            width: 100%; min-height: 200px; background: url('../game_power/item_background.png') no-repeat center center; background-size: 500px 500px; padding: 10px 15px; font-size: 13px;
            display: flex; align-items: center; justify-content: center;
        }
        .image-container img { width: 100%; height: auto; display: block; }
        .loading-spinner {
            border: 3px solid #e0e0e0; border-top: 3px solid #007bff;
            border-radius: 50%; width: 40px; height: 40px;
            animation: spin 1s linear infinite; margin: 10px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .error-state { text-align: center; padding: 40px; color: #dc3545; }
        
        .image-info {
            padding: 12px; display: flex; justify-content: space-between;
            align-items: center; background: #ffffff00; border-top: 1px solid #e0e0e0;
            flex-wrap: wrap; gap: 8px;
        }
        .image-name { font-size: 14px; font-weight: bold; color: #333; }
        .status-badge {
            padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: bold;
        }
        .status-success { background: #d4edda; color: #155724; }
        .status-error { background: #f8d7da; color: #721c24; }
        
        .download-btn {
            padding: 6px 14px; background: url('../game_power/button.png') no-repeat center center; background-size: 80px 40px; color: #fff;
            text-decoration: none; border-radius: 8px; font-size: 13px;
            font-weight: bold; transition: background 0.2s;
        }
        .download-btn:hover { background: #218838; }
        
        .stats {
            background: url('../game_power/player_f.png') no-repeat center center; background-size: 450px 60px; 
            color: #0056b3; border-bottom: 1px solid #e0e0e0;
        }
        .empty-msg { text-align: center; padding: 40px; color: #666; }
        .no-items { text-align: center; padding: 40px; color: #6c757d; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🖼️ معرض صور الشخصيات والساحات</h1>
            <p>اختر المجموعة لعرض الصور</p>        </div>
        
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="🔍 ابحث عن صورة...">
        </div>
        
        <div class="search-result" id="searchResult"></div>
        
        <!-- شريط المجموعات -->
        <div class="category-bar" id="categoryBar"></div>
        
        <div class="stats" id="stats" style="display:none;"></div>
        
        <div class="gallery" id="gallery">
            <div class="empty-msg">
                <div class="loading-spinner"></div>
                <p>جاري التحميل...</p>
            </div>
        </div>
    </div>

    <script>
        const gallery = document.getElementById('gallery');
        const statsDiv = document.getElementById('stats');
        const searchInput = document.getElementById('searchInput');
        const searchResult = document.getElementById('searchResult');
        const categoryBar = document.getElementById('categoryBar');
        
        let totalImages = 0, loadedImages = 0, failedImages = 0;
        let categories = {};
        let currentCategory = '';
        let allItems = [];

        async function loadDataFile() {
            try {
                const response = await fetch('data.txt');
                if (!response.ok) throw new Error('data.txt غير موجود');
                
                const text = await response.text();
                const lines = text.split('\n').filter(line => line.trim() !== '');
                
                // قراءة المجموعات والعناصر
                let currentCat = null;
                categories = {};
                
                for (const line of lines) {
                    const trimmed = line.trim();
                    if (trimmed.startsWith('#')) {
                        // مجموعة جديدة
                        currentCat = trimmed.substring(1).trim();                        categories[currentCat] = [];
                    } else if (currentCat) {
                        // عنصر ينتمي للمجموعة الحالية
                        const fileName = trimmed.endsWith('.png') ? trimmed : trimmed + '.png';
                        const item = {
                            name: trimmed,
                            fileName: fileName,
                            category: currentCat
                        };
                        categories[currentCat].push(item);
                        allItems.push(item);
                    }
                }
                
                if (allItems.length === 0) {
                    gallery.innerHTML = '<div class="empty-msg">📄 الملف فارغ أو لا يحتوي على مجموعات صحيحة</div>';
                    return;
                }
                
                // إنشاء أزرار المجموعات
                createCategoryButtons();
                
                // عرض أول مجموعة تلقائياً
                const firstCategory = Object.keys(categories)[0];
                if (firstCategory) {
                    showCategory(firstCategory);
                }
                
            } catch (error) {
                console.error(error);
                gallery.innerHTML = '<div class="empty-msg" style="color:#dc3545">⚠️ خطأ في قراءة data.txt</div>';
            }
        }

        function createCategoryButtons() {
            categoryBar.innerHTML = '';
            
            for (const [catName, items] of Object.entries(categories)) {
                const btn = document.createElement('button');
                btn.className = 'category-btn';
                btn.dataset.category = catName;
                btn.innerHTML = `<span class="count">${items.length}</span> ${catName}`;
                btn.onclick = () => showCategory(catName);
                
                categoryBar.appendChild(btn);
            }
        }

        function showCategory(categoryName) {
            currentCategory = categoryName;            
            // تحديث الأزرار النشطة
            document.querySelectorAll('.category-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.dataset.category === categoryName) {
                    btn.classList.add('active');
                }
            });
            
            // عرض العناصر
            gallery.innerHTML = '';
            loadedImages = 0;
            failedImages = 0;
            
            const items = categories[categoryName] || [];
            totalImages = items.length;
            
            if (items.length === 0) {
                gallery.innerHTML = '<div class="no-items">📭 لا توجد عناصر في هذه المجموعة</div>';
                statsDiv.style.display = 'none';
                return;
            }
            
            statsDiv.style.display = 'block';
            statsDiv.textContent = `المجموعة: ${categoryName} | ${totalImages} عنصر`;
            
            // إنشاء البطاقات
            for (const item of items) {
                createImageCard(item.fileName, item.name);
            }
            
            // تحميل الصور
            loadAllImages();
        }

        function createImageCard(fileName, displayName) {
            const card = document.createElement('div');
            card.className = 'image-card';
            const safeId = fileName.replace(/[^a-z0-9]/gi, '-');
            
            card.innerHTML = `
                <div class="image-container" id="container-${safeId}">
                    <div class="loading-spinner"></div>
                </div>
                <div class="image-info">
                    <span class="image-name">${displayName}</span>
                    <span class="status-badge" id="status-${safeId}">⏳</span>
                </div>
            `;
            gallery.appendChild(card);        }

        async function loadAllImages() {
            const cards = document.querySelectorAll('.image-card');
            
            for (const card of cards) {
                const container = card.querySelector('.image-container');
                const statusBadge = card.querySelector('.status-badge');
                const infoDiv = card.querySelector('.image-info');
                const imgName = card.querySelector('.image-name').textContent;
                const fileName = imgName.endsWith('.png') ? imgName : imgName + '.png';
                
                const img = new Image();
                
                img.onload = function() {
                    container.innerHTML = '';
                    container.appendChild(img);
                    
                    statusBadge.className = 'status-badge status-success';
                    statusBadge.textContent = '✅';
                    
                    const dlBtn = document.createElement('a');
                    dlBtn.href = fileName;
                    dlBtn.download = fileName;
                    dlBtn.className = 'download-btn';
                    dlBtn.textContent = '⬇️ تحميل';
                    infoDiv.appendChild(dlBtn);
                    
                    loadedImages++;
                    updateStats();
                };
                
                img.onerror = function() {
                    container.innerHTML = '<div class="error-state">❌ غير موجودة</div>';
                    statusBadge.className = 'status-badge status-error';
                    statusBadge.textContent = '❌';
                    failedImages++;
                    updateStats();
                };
                
                img.src = fileName;
                await new Promise(resolve => setTimeout(resolve, 50));
            }
        }

        function searchImage() {
            const name = searchInput.value.trim();
            if (!name) return;
            const fileName = name.endsWith('.png') ? name : name + '.png';
                        searchResult.className = 'search-result show';
            searchResult.innerHTML = '<div class="loading-spinner"></div><p style="text-align:center">جاري البحث...</p>';
            
            const img = new Image();
            img.onload = function() {
                searchResult.innerHTML = `
                    <img src="${fileName}" alt="${name}">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <span style="font-weight:bold; color:#333;">✅ ${fileName}</span>
                        <a href="${fileName}" download="${fileName}" class="download-btn">⬇️ تحميل</a>
                    </div>
                `;
            };
            img.onerror = function() {
                searchResult.innerHTML = `<div class="error-state">❌ غير موجودة: ${fileName}</div>`;
            };
            img.src = fileName;
        }

        function updateStats() {
            const total = loadedImages + failedImages;
            if (total === totalImages && totalImages > 0) {
                statsDiv.textContent += ` | ✅ ${loadedImages} | ❌ ${failedImages}`;
            }
        }

        searchInput.addEventListener('keypress', e => { if (e.key === 'Enter') searchImage(); });
        window.addEventListener('DOMContentLoaded', loadDataFile);
    </script>
</body>
</html>
